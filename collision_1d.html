<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>1D Collisions</title>
  <!-- Original AoPS interactive. Replaces the third-party "Collision Lab" simulation. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="eigennode-aspect" content="12/5">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      overflow: hidden;
      background: #f8f9fe;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #cwrap {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas { display: block; max-width: 100%; max-height: 100%; }
    #ui {
      flex: 0 0 auto;
      width: 100%;
      max-width: 600px;
      min-height: 46px; padding: 4px 8px;
      font-size: 11px; color: #334455;
      display: flex; align-items: center; justify-content: center;
      flex-wrap: wrap; gap: 7px;
    }
    button {
      font-family: inherit; font-size: 11px; padding: 2px 8px;
      border: 1px solid #b8c4d4; border-radius: 4px;
      background: #ffffff; color: #334455; cursor: pointer;
    }
    button:hover { background: #eef3f9; }
    label { display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; }
    input[type=number] {
      width: 46px; font-family: inherit; font-size: 11px; padding: 1px 2px;
      border: 1px solid #b8c4d4; border-radius: 3px; color: #334455;
    }
    input[type=range] { vertical-align: middle; }
    .u { color: #889; }
  </style>
</head>
<body>
  <div id="cwrap"><canvas id="c" width="600" height="204"></canvas></div>
  <div id="ui">
    <button id="playBtn">&#10074;&#10074;</button>
    <button id="resetBtn">&#8634;</button>
    <label><input type="checkbox" id="slowCk"> Slow</label>
    <label>m&#8321; <input type="number" id="m1" min="0.1" max="50" step="0.5" value="1"><span class="u">kg</span></label>
    <label>m&#8322; <input type="number" id="m2" min="0.1" max="50" step="0.5" value="3"><span class="u">kg</span></label>
    <label>v&#8321; <input type="number" id="v1" min="-5" max="5" step="0.5" value="1"><span class="u">m/s</span></label>
    <label>v&#8322; <input type="number" id="v2" min="-5" max="5" step="0.5" value="-1"><span class="u">m/s</span></label>
    <label>elasticity <input type="range" id="el" min="0" max="1" step="0.05" value="1" style="width:80px"></label>
    <span id="elVal" style="min-width:28px">1.00</span>
  </div>
  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 600, H = 204;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.scale(dpr, dpr);
    const PXM = 150;                 // px per meter
    // Box (the GIF capture region is the whole canvas)
    const BOX_L = 15, BOX_R = 585;   // interior walls, px
    const BOX_T = 30, BOX_B = 196;   // outer rect top/bottom, px
    const WM = (BOX_R - BOX_L) / PXM;   // interior width = 3.8 m
    const BALL_Y = 115;              // ball centerline, px
    const ARROW_PX = 55;             // px per (m/s) of velocity arrow

    const Q = new URLSearchParams(location.search);
    const qf = (k, d) => {
      const v = parseFloat(Q.get(k));
      return isFinite(v) ? v : d;
    };
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

    // ── Parameters (URL: ?m1=1&m2=3&v1=1&v2=-1&e=1[&x1=&x2=&slow=1&paused=1]) ──
    const P = {
      m1: clamp(qf('m1', 1), 0.1, 50),
      m2: clamp(qf('m2', 3), 0.1, 50),
      v1: clamp(qf('v1', 1), -5, 5),
      v2: clamp(qf('v2', -1), -5, 5),
      e:  clamp(qf('e', 1), 0, 1),
      x1: qf('x1', NaN),               // meters from left interior wall (optional)
      x2: qf('x2', NaN),
    };

    const radiusM = m => clamp(24 * Math.cbrt(m), 9, 55) / PXM;

    // ── State ────────────────────────────────────────────────
    const S = { m1: 1, m2: 3, r1: 0, r2: 0, x1: 0, x2: 0, v1: 0, v2: 0, e: 1 };
    let playing = true;

    function init() {
      S.m1 = P.m1; S.m2 = P.m2; S.e = P.e;
      S.r1 = radiusM(S.m1); S.r2 = radiusM(S.m2);
      // Default start: each ball touching its wall, so the standard
      // m1:m2 = 1:3 cycle (approach at v0/2 each) loops exactly.
      S.x1 = isFinite(P.x1) ? clamp(P.x1, S.r1, WM - S.r1) : S.r1;
      S.x2 = isFinite(P.x2) ? clamp(P.x2, S.r2, WM - S.r2) : WM - S.r2;
      if (S.x2 - S.x1 < S.r1 + S.r2) {  // separate if overlapping
        const mid = (S.x1 + S.x2) / 2;
        S.x1 = mid - (S.r1 + S.r2) / 2 - 0.001;
        S.x2 = mid + (S.r1 + S.r2) / 2 + 0.001;
      }
      S.v1 = P.v1; S.v2 = P.v2;
    }

    // ── Physics: exact event-driven 1D advance ───────────────
    function ballBallImpulse() {
      const { m1, m2, e } = S, u1 = S.v1, u2 = S.v2;
      const pm = m1 * u1 + m2 * u2;
      S.v1 = (pm + m2 * e * (u2 - u1)) / (m1 + m2);
      S.v2 = (pm + m1 * e * (u1 - u2)) / (m1 + m2);
    }

    function advance(dt) {
      let rem = dt, guard = 0;
      while (rem > 1e-9 && guard++ < 80) {
        let tHit = rem, kind = null;
        if (S.v1 < 0) { const t = (S.x1 - S.r1) / -S.v1;       if (t < tHit) { tHit = t; kind = 'w1'; } }
        if (S.v1 > 0) { const t = (WM - S.r1 - S.x1) / S.v1;   if (t < tHit) { tHit = t; kind = 'w1'; } }
        if (S.v2 < 0) { const t = (S.x2 - S.r2) / -S.v2;       if (t < tHit) { tHit = t; kind = 'w2'; } }
        if (S.v2 > 0) { const t = (WM - S.r2 - S.x2) / S.v2;   if (t < tHit) { tHit = t; kind = 'w2'; } }
        if (S.v1 > S.v2) {
          const t = (S.x2 - S.x1 - (S.r1 + S.r2)) / (S.v1 - S.v2);
          if (t >= 0 && t < tHit) { tHit = t; kind = 'bb'; }
        }
        S.x1 += S.v1 * tHit;
        S.x2 += S.v2 * tHit;
        rem -= tHit;
        if (kind === 'w1') S.v1 = -S.v1;            // walls always elastic
        else if (kind === 'w2') S.v2 = -S.v2;
        else if (kind === 'bb') ballBallImpulse();
        else break;
      }
      S.x1 = clamp(S.x1, S.r1, WM - S.r1);
      S.x2 = clamp(S.x2, S.r2, WM - S.r2);
    }

    // ── Drawing ──────────────────────────────────────────────
    function drawArrow(x0, y0, dx, color) {
      if (Math.abs(dx) < 4) return;
      const dir = Math.sign(dx), hs = 13;
      ctx.save();
      ctx.strokeStyle = '#0a7a0a'; ctx.fillStyle = color;
      ctx.lineWidth = 5.5; ctx.lineCap = 'butt';
      ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x0 + dx - dir * hs * 0.6, y0); ctx.stroke();
      ctx.strokeStyle = color; ctx.lineWidth = 3.2;
      ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x0 + dx - dir * hs * 0.6, y0); ctx.stroke();
      // head (outlined)
      ctx.beginPath();
      ctx.moveTo(x0 + dx, y0);
      ctx.lineTo(x0 + dx - dir * hs, y0 - hs * 0.5);
      ctx.lineTo(x0 + dx - dir * hs, y0 + hs * 0.5);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#0a7a0a'; ctx.lineWidth = 1.4; ctx.stroke();
      ctx.restore();
    }

    function drawBall(xm, rm, fill, label) {
      const px = BOX_L + xm * PXM, r = rm * PXM;
      const g = ctx.createRadialGradient(px - r * 0.35, BALL_Y - r * 0.35, r * 0.15,
                                         px, BALL_Y, r);
      g.addColorStop(0, '#ffffff');
      g.addColorStop(0.3, fill);
      g.addColorStop(1, fill);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(px, BALL_Y, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(20,30,80,0.65)'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#1a2a6a';
      ctx.font = 'bold 15px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(label, px, BALL_Y + 1);
      ctx.textBaseline = 'alphabetic';
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#f8f9fe'; ctx.fillRect(0, 0, W, H);

      // 0.5 m scale bar (top-left, above the box)
      const sbY = 14, sbX = BOX_L, sbW = 0.5 * PXM;
      ctx.strokeStyle = '#222'; ctx.fillStyle = '#222'; ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(sbX, sbY); ctx.lineTo(sbX + sbW, sbY);
      ctx.moveTo(sbX, sbY - 5); ctx.lineTo(sbX, sbY + 5);
      ctx.moveTo(sbX + sbW, sbY - 5); ctx.lineTo(sbX + sbW, sbY + 5);
      ctx.stroke();
      // small arrowheads
      ctx.beginPath();
      ctx.moveTo(sbX + 2, sbY); ctx.lineTo(sbX + 9, sbY - 3.5); ctx.lineTo(sbX + 9, sbY + 3.5);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(sbX + sbW - 2, sbY); ctx.lineTo(sbX + sbW - 9, sbY - 3.5); ctx.lineTo(sbX + sbW - 9, sbY + 3.5);
      ctx.closePath(); ctx.fill();
      ctx.font = '12px Segoe UI'; ctx.textAlign = 'center';
      ctx.fillText('0.5 m', sbX + sbW / 2, sbY - 7);

      // bordered box
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(BOX_L - 2, BOX_T, BOX_R - BOX_L + 4, BOX_B - BOX_T);
      ctx.strokeStyle = '#223a8c'; ctx.lineWidth = 2.5;
      ctx.strokeRect(BOX_L - 2, BOX_T, BOX_R - BOX_L + 4, BOX_B - BOX_T);

      // ruler ticks along the inside top edge (every 0.1 m; longer every 0.5 m)
      ctx.strokeStyle = '#5a6a9a'; ctx.lineWidth = 1;
      ctx.beginPath();
      for (let m = 0; m <= WM + 1e-9; m += 0.1) {
        const tx = BOX_L + m * PXM;
        if (tx > BOX_R) break;
        const long = (Math.round(m * 10) % 5 === 0);
        ctx.moveTo(tx, BOX_T + 1);
        ctx.lineTo(tx, BOX_T + (long ? 11 : 6));
      }
      ctx.stroke();

      // balls + velocity arrows
      drawBall(S.x1, S.r1, '#35dcd2', '1');
      drawBall(S.x2, S.r2, '#ee2fae', '2');
      drawArrow(BOX_L + S.x1 * PXM, BALL_Y, S.v1 * ARROW_PX, '#33dd33');
      drawArrow(BOX_L + S.x2 * PXM, BALL_Y, S.v2 * ARROW_PX, '#33dd33');
    }

    // ── Animation loop ───────────────────────────────────────
    let lastTs = null;
    function frame(ts) {
      if (lastTs === null) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;
      if (playing) advance(dt * (slowCk.checked ? 0.25 : 1));
      draw();
      requestAnimationFrame(frame);
    }

    // ── Controls ─────────────────────────────────────────────
    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');
    const slowCk = document.getElementById('slowCk');
    const m1In = document.getElementById('m1'), m2In = document.getElementById('m2');
    const v1In = document.getElementById('v1'), v2In = document.getElementById('v2');
    const elIn = document.getElementById('el'), elVal = document.getElementById('elVal');

    function updatePlayBtn() {
      playBtn.innerHTML = playing ? '&#10074;&#10074;' : '&#9654;';
    }
    playBtn.addEventListener('click', () => { playing = !playing; updatePlayBtn(); });
    resetBtn.addEventListener('click', () => {
      init(); playing = false; updatePlayBtn();
    });

    function readInputs() {
      P.m1 = clamp(parseFloat(m1In.value) || 1, 0.1, 50);
      P.m2 = clamp(parseFloat(m2In.value) || 1, 0.1, 50);
      P.v1 = clamp(parseFloat(v1In.value) || 0, -5, 5);
      P.v2 = clamp(parseFloat(v2In.value) || 0, -5, 5);
      P.e  = clamp(parseFloat(elIn.value), 0, 1);
      P.x1 = NaN; P.x2 = NaN;          // edits restart from wall positions
      elVal.textContent = P.e.toFixed(2);
      init();
    }
    [m1In, m2In, v1In, v2In].forEach(el => el.addEventListener('change', readInputs));
    elIn.addEventListener('input', () => {
      P.e = clamp(parseFloat(elIn.value), 0, 1);
      S.e = P.e;                        // elasticity applies live
      elVal.textContent = P.e.toFixed(2);
    });

    // reflect URL params in the controls
    m1In.value = P.m1; m2In.value = P.m2;
    v1In.value = P.v1; v2In.value = P.v2;
    elIn.value = P.e; elVal.textContent = P.e.toFixed(2);
    if (Q.get('slow') === '1') slowCk.checked = true;
    if (Q.get('paused') === '1') playing = false;

    init();
    updatePlayBtn();
    requestAnimationFrame(frame);
  })();
  </script>




<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var CHEAT_DEFS = [
    {
        "name": "m1",
        "type": "number",
        "min": 0.1,
        "max": 50,
        "step": 0.1,
        "default": 1,
        "desc": "Mass of ball 1 (kg)"
    },
    {
        "name": "m2",
        "type": "number",
        "min": 0.1,
        "max": 50,
        "step": 0.1,
        "default": 3,
        "desc": "Mass of ball 2 (kg)"
    },
    {
        "name": "v1",
        "type": "number",
        "min": -5,
        "max": 5,
        "step": 0.1,
        "default": 1,
        "desc": "Initial velocity of ball 1 (m/s)"
    },
    {
        "name": "v2",
        "type": "number",
        "min": -5,
        "max": 5,
        "step": 0.1,
        "default": -1,
        "desc": "Initial velocity of ball 2 (m/s)"
    },
    {
        "name": "e",
        "type": "number",
        "min": 0,
        "max": 1,
        "step": 0.1,
        "default": 1,
        "desc": "Coefficient of restitution (0=perfectly inelastic, 1=elastic)"
    },
    {
        "name": "slow",
        "type": "toggle",
        "default": 0,
        "desc": "Slow-motion mode"
    },
    {
        "name": "paused",
        "type": "toggle",
        "default": 0,
        "desc": "Start paused"
    },
    {
        "name": "maxscale",
        "type": "number",
        "min": 0.5,
        "max": 5,
        "step": 0.1,
        "default": 2.4,
        "desc": "Max zoom factor for responsive scaling"
    },
    {
        "name": "maxw",
        "type": "number",
        "min": 200,
        "max": 2000,
        "step": 50,
        "default": "",
        "desc": "Max rendered width (px); 0 = uncapped"
    },
    {
        "name": "h",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": "",
        "desc": "Exact reported iframe height (px); overrides auto"
    },
    {
        "name": "maxh",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": 320,
        "desc": "Ceiling on auto-reported iframe height (px)"
    }
  {name:'zoom', type:'toggle', default:0, desc:'Enable zoom/pan controls'},
];

  var EMBED_KEYS = ['cheat'];
  function buildCleanUrl(ov) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function(k) { p.delete(k); });
    for (var k in ov) { var v=ov[k]; if(v===null||v==='') p.delete(k); else p.set(k,v); }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }
  function buildCheatUrl(ov) {
    var b = buildCleanUrl(ov);
    return b + (b.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }
  function getEff(d) {
    var r = _cpQ.get(d.name);
    return r !== null ? r : (d['default'] !== undefined ? String(d['default']) : '');
  }
  function isTruthy(v) { return v!=='0'&&v!=='false'&&v!=='no'&&v!=='off'&&v!==''; }

  function makeControl(d) {
    var eff = getEff(d);
    if (d.type === 'toggle') {
      var on = isTruthy(eff), btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:'+(on?'#1b3d1b':'#3d1b1b')+';color:'+(on?'#6dca80':'#e07070')+
        ';border:1px solid '+(on?'#2a7a3a':'#8a2a2a')+';border-radius:3px;padding:3px 10px;'+
        'cursor:pointer;font-size:12px;min-width:70px';
      btn.onclick = function() { var u={}; u[d.name]=on?'0':'1'; location.href=buildCheatUrl(u); };
      return btn;
    }
    if (d.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;'+
        'border-radius:3px;padding:3px 8px;font-size:12px;cursor:pointer';
      d.values.forEach(function(v) {
        var o = document.createElement('option'); o.value=v; o.textContent=v;
        if (eff===String(v)) o.selected=true; sel.appendChild(o);
      });
      sel.onchange = function() { var u={}; u[d.name]=sel.value; location.href=buildCheatUrl(u); };
      return sel;
    }
    var inp = document.createElement('input');
    inp.type = d.type==='number' ? 'number' : 'text'; inp.value = eff;
    if (d.min!==undefined) inp.min=String(d.min);
    if (d.max!==undefined) inp.max=String(d.max);
    if (d.step!==undefined) inp.step=String(d.step);
    inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;'+
      'border-radius:3px;padding:3px 6px;width:'+(d.type==='number'?'90':'220')+'px;font-size:12px';
    inp.onchange = function() { var u={}; u[d.name]=inp.value; location.href=buildCheatUrl(u); };
    return inp;
  }

  function typeLabel(d) {
    if (d.type==='toggle') return '0|1';
    if (d.type==='select') return d.values.join('|');
    if (d.type==='number'&&d.min!==undefined&&d.max!==undefined) return d.min+'–'+d.max;
    return d.type;
  }

  function render() {
    var panel = document.createElement('div');
    panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;'+
      'background:rgba(12,18,32,0.97);color:#c8d8e8;'+
      'font-family:"Segoe UI",system-ui,monospace;font-size:13px;'+
      'border-top:2px solid #3a7bd5;z-index:2147483647;max-height:48vh;overflow-y:auto;'+
      'padding:10px 16px 14px;box-sizing:border-box;box-shadow:0 -4px 24px rgba(0,0,0,0.6)';

    var bubble = document.createElement('button');
    bubble.style.cssText = 'position:fixed;bottom:8px;right:12px;'+
      'background:rgba(12,18,32,0.95);color:#7ab8f5;border:1px solid #3a7bd5;'+
      'border-radius:4px;padding:4px 12px;font-size:12px;'+
      'font-family:"Segoe UI",system-ui,monospace;cursor:pointer;'+
      'z-index:2147483647;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.5);user-select:none';
    bubble.textContent = '🔑 Cheat Panel';
    bubble.onclick = function() { bubble.style.display='none'; panel.style.display=''; };
    document.body.appendChild(bubble);

    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-weight:bold;color:#7ab8f5;margin-bottom:8px;'+
      'display:flex;align-items:center;justify-content:space-between';
    var hspan = document.createElement('span');
    hspan.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var btns = document.createElement('div');
    btns.style.cssText = 'display:flex;align-items:center;gap:2px';
    var minbtn = document.createElement('button');
    minbtn.textContent = '−';
    minbtn.title = 'Minimize (restore without reloading)';
    minbtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;cursor:pointer;padding:0 4px;line-height:1';
    minbtn.onclick = function() { panel.style.display='none'; bubble.style.display=''; };
    var xbtn = document.createElement('button');
    xbtn.textContent = '×'; xbtn.title = 'Close (reload to restore)';
    xbtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;cursor:pointer;padding:0 4px;line-height:1';
    xbtn.onclick = function() { panel.remove(); bubble.remove(); };
    btns.appendChild(minbtn); btns.appendChild(xbtn);
    hdr.appendChild(hspan); hdr.appendChild(btns); panel.appendChild(hdr);

    var tbl = document.createElement('table');
    tbl.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var hrow = tbl.createTHead().insertRow();
    ['Parameter','Type/Values','Control','Description'].forEach(function(h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;'+
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = tbl.createTBody();
    CHEAT_DEFS.forEach(function(d) {
      var row = tbody.insertRow(), isSet = _cpQ.has(d.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;'+
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;'+
        'color:'+(isSet?'#a8d4ff':'#7fa8d0')+';white-space:nowrap;font-family:monospace';
      nc.textContent = d.name;
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;font-family:monospace';
      tc.textContent = typeLabel(d);
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(d));
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (d.desc||'')+(d['default']!==undefined?' (default: '+d['default']+')':'');
    });
    panel.appendChild(tbl);

    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;'+
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var ulbl = document.createElement('span');
    ulbl.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;'+
      'letter-spacing:.06em;white-space:nowrap;flex-shrink:0';
    ulbl.textContent = 'Embed URL:';
    var ulink = document.createElement('a');
    ulink.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;'+
      'font-family:monospace;text-decoration:none';
    ulink.href = buildCleanUrl({}); ulink.textContent = buildCleanUrl({});
    ulink.onclick = function(e) { e.preventDefault(); location.href=buildCheatUrl({}); };
    var cpybtn = document.createElement('button');
    cpybtn.textContent = 'copy';
    cpybtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;'+
      'border-radius:3px;padding:2px 8px;font-size:11px;cursor:pointer;'+
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    cpybtn.onclick = function() {
      navigator.clipboard && navigator.clipboard.writeText(buildCleanUrl({}));
      cpybtn.textContent = '✓ copied';
      setTimeout(function() { cpybtn.textContent = 'copy'; }, 1500);
    };
    urlBox.appendChild(ulbl); urlBox.appendChild(ulink); urlBox.appendChild(cpybtn);
    panel.appendChild(urlBox);
    document.body.appendChild(panel);
  }
  render();
})();
</script>
<!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
