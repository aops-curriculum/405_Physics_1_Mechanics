<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Skate Park</title>
  <!-- Original AoPS interactive. Replaces the third-party "Energy Skate Park" simulation. -->
  <!--
    CALIBRATION (acceptance tests — see analysis/build_notes/energy_skate_park.md):
      * W Track, g=9.8, frictionless, start at the 4.6 m standard start (red dot on the
        middle of the 2nd centerline dash): full back-and-forth lap = 5.30 s (graded 5.2-5.4).
      * v^2 vs height y on any frictionless track from y0=4.6: v^2 = 90.16 - 19.6*y
        (intercept "90", slope -2g, reaches v^2=0 at y=4.6). At g=13.3: intercept 122.4.
      * Steps scene (?track=steps, g=10, stick off, 60 kg): ramp-1 drop 0.925 m ->
        launch 4.30 m/s (KE label 555 J); frictionless far-edge-of-ramp-2 speed 2.20 m/s
        (KE label 145 J); friction 0.0089 -> launch 3.70 m/s (KE 411 J ~ remove 410 J)
        and the skater stops at the very edge of ramp 2.
      * Kitty Hills: 8 control points, exactly 3 stable equilibrium points.
    Run ?selftest=1 and open the console to re-verify all of the above in-place.
  -->
<!--
  RESPONSIVE PRESENTATION. The physics, art, tools, URL params and grading are
  unchanged from the original fixed-size build — only the *presentation*
  differs: the whole sim (canvas + panel) is one fixed-size #stage that is
  CSS-transform-scaled to fit whatever space the iframe is given, preserving
  aspect ratio, centred, capped at a maximum size. The earlier fixed-pixel
  layout + "auto-height v2.4" height-measuring snippet are replaced by the fit
  controller near the bottom of the main script (search "RESPONSIVE FIT
  CONTROLLER"). The classroom sizes the iframe/sticky to the { type:'resize',
  height } we post and does NOT clamp it, so the reported height is BOUNDED
  (default <=320px) to avoid spilling the sticky; the sim then scale-fits
  whatever box it lands in. Tunable per embed: ?h=NNN sets an exact sticky
  height (sim fills it), ?maxh=NNN raises the anti-spill ceiling, ?maxw= /
  ?maxscale= bound the render zoom.
-->

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    /* Body is the iframe viewport. The sim lives in #stage; the space around a
       letter-boxed stage is transparent so it blends into the classroom
       background instead of showing a grey box. */
    body {
      position: relative; background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none; -webkit-user-select: none;
      -webkit-text-size-adjust: 100%;
    }
    /* Fixed natural size (584x304, or 384 wide when the panel is hidden).
       fitStage() scales this with transform to fill the viewport, centred,
       preserving aspect ratio, capped at a maximum. Transform is presentation
       only — it does not change offsetX/Y, so all pointer math is unchanged. */
    #stage {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center center; will-change: transform;
      width: 584px; height: 304px; overflow: hidden;
      display: flex; background: #eef2f6;
    }
    body.clean #stage { width: 384px; }
    body.clean #panel { display: none; }
    /* Locked MCH04 classroom preset: loads pre-configured (W track, standard
       start, speedometer on) with the setup/extra options hidden, leaving only
       the tools the energy experiment uses (speedometer, tape, stopwatch,
       gravity, restart). Keeps everyone on the same page with zero setup. */
    body.mch04 #trackLbl, body.mch04 #trackBtns, body.mch04 #buildRow,
    body.mch04 #fricRow, body.mch04 #massrow, body.mch04 #btnReset,
    body.mch04 #lblBars, body.mch04 #lblGrid, body.mch04 #lblRef,
    body.mch04 #lblStick { display: none !important; }
    canvas { display: block; flex: 0 0 384px; }
    #panel {
      flex: 1 1 auto; width: 200px; height: 304px; padding: 7px 9px 5px;
      background: #f3f6f9; border-left: 1px solid #d4dde5;
      font-size: 11.5px; color: #2c3e50; overflow-y: auto; overflow-x: hidden;
    }
    #panel h1 { font-size: 15px; color: #1d3557; margin-bottom: 4px; font-weight: 600; }
    .seclbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
              color: #7d8fa0; margin: 5px 0 2px; }
    #trackBtns { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
    #trackBtns button, #buildRow button, .act {
      font: 11px 'Segoe UI', system-ui, sans-serif; padding: 3px 2px;
      background: #fff; color: #2c3e50; border: 1px solid #b8c6d2;
      border-radius: 4px; cursor: pointer;
    }
    #trackBtns button:hover, #buildRow button:hover, .act:hover { background: #e8f1f8; }
    #trackBtns button.on { background: #2f6fb3; color: #fff; border-color: #2f6fb3; }
    #buildRow { display: none; gap: 3px; margin-top: 3px; }
    #buildRow button { flex: 1; }
    label.cb { display: block; line-height: 17px; cursor: pointer; }
    label.cb input { vertical-align: -2px; margin-right: 4px; }
    .slrow { margin-top: 3px; }
    .slrow .vals { float: right; color: #1d3557; font-weight: 600; }
    input[type=range] { width: 100%; height: 18px; cursor: pointer; }
    .gbtns { display: flex; gap: 3px; }
    .gbtns button { flex: 1; font-size: 10px; padding: 2px 0; }
    #massrow { color: #5d6f80; margin-top: 4px; }
    .bigbtns { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
    .bigbtns button { padding: 4px 0; font-size: 11.5px; }
    #mag {
      position: fixed; z-index: 1000; pointer-events: none; display: none;
      border: 2px solid #222; border-radius: 5px; background: #fff;
      image-rendering: pixelated;
      box-shadow: 0 3px 12px rgba(0,0,0,0.45);
    }
  </style>
</head>
<body>
<div id="stage">
<canvas id="c" width="600" height="500"></canvas>
<div id="panel">
  <h1>Skate Park</h1>
  <div class="seclbl" id="trackLbl">Track</div>
  <div id="trackBtns">
    <button data-t="u">U Valley</button><button data-t="w">W Track</button>
    <button data-t="ramp">Ramp</button><button data-t="steps">Steps</button>
    <button data-t="kitty">Kitty Hills</button><button data-t="build">Build</button>
    <button data-t="float" style="grid-column:1/-1">Float Ramps</button>
    <button data-t="draw" id="btnDrawTrack" style="grid-column:1/-1; display:none">Draw Track</button>
  </div>
  <div id="buildRow"><button id="addPt">+ point</button><button id="delPt">&minus; point</button></div>
  <div class="seclbl">Tools</div>
  <label class="cb" id="lblBars"><input type="checkbox" id="cbBars" checked> Energy bar chart</label>
  <label class="cb"><input type="checkbox" id="cbSpeed"> Speedometer</label>
  <label class="cb" id="lblGrid"><input type="checkbox" id="cbGrid"> Grid</label>
  <label class="cb" id="lblRef"><input type="checkbox" id="cbRef"> Reference height</label>
  <label class="cb"><input type="checkbox" id="cbTape"> Measuring tape</label>
  <label class="cb"><input type="checkbox" id="cbWatch"> Stopwatch</label>
  <label class="cb" id="lblStick"><input type="checkbox" id="cbStick" checked> Stick to track</label>
  <div class="slrow"><span>Gravity</span><span class="vals"><span id="gVal">9.8</span> m/s&sup2;</span>
    <input type="range" id="slG" min="1" max="25" step="0.1" value="9.8">
    <div class="gbtns"><button id="gMoon">Moon 1.6</button><button id="gEarth">Earth 9.8</button><button id="gJup">Jupiter 24.8</button></div>
  </div>
  <div class="slrow" id="fricRow"><span>Friction</span><span class="vals" id="fVal">0.000</span>
    <input type="range" id="slF" min="0" max="0.1" step="0.0005" value="0">
  </div>
  <div id="massrow">Mass: 60 kg (fixed)</div>
  <div class="bigbtns">
    <button class="act" id="btnRestart">&#8635; Restart skater</button>
    <button class="act" id="btnReset">&#8634; Reset all</button>
  </div>
</div>
</div>
<canvas id="mag" width="128" height="128"></canvas>
<script>
(() => {
'use strict';

// ==ESP-PHYSICS-CORE-BEGIN==
// Pure physics: no DOM. This exact block is shared by the sim and the
// offline calibration harness (extracted by marker comments and run in Node).
var MASS = 60;              // kg, fixed (matches MCH05 energy numbers)
var FRICTION_SCALE = 30;    // slider f in [0,0.1] -> damping b = f*FRICTION_SCALE (1/s)
var SUBDT = 1 / 240;        // physics substep, s

// --- Centripetal Catmull-Rom sampling --------------------------------------
function catmullSample(ptsIn, perSeg) {
  perSeg = perSeg || 70;
  // drop consecutive duplicates
  var pts = [];
  for (var i = 0; i < ptsIn.length; i++) {
    var p = ptsIn[i];
    if (!pts.length || Math.hypot(p[0] - pts[pts.length - 1][0], p[1] - pts[pts.length - 1][1]) > 1e-6)
      pts.push([p[0], p[1]]);
  }
  if (pts.length < 2) pts.push([pts[0][0] + 1, pts[0][1]]);
  // pad ends by reflection so the spline passes through the end points
  var P = pts.slice();
  P.unshift([2 * pts[0][0] - pts[1][0], 2 * pts[0][1] - pts[1][1]]);
  var n = pts.length;
  P.push([2 * pts[n - 1][0] - pts[n - 2][0], 2 * pts[n - 1][1] - pts[n - 2][1]]);

  var X = [], Y = [];
  function knot(t, a, b) { return Math.pow(Math.hypot(b[0] - a[0], b[1] - a[1]), 0.5) + t; }
  for (var seg = 0; seg + 3 < P.length; seg++) {
    var p0 = P[seg], p1 = P[seg + 1], p2 = P[seg + 2], p3 = P[seg + 3];
    var t0 = 0, t1 = knot(t0, p0, p1), t2 = knot(t1, p1, p2), t3 = knot(t2, p2, p3);
    if (t2 - t1 < 1e-9) continue;
    for (var j = (seg === 0 ? 0 : 1); j <= perSeg; j++) {
      var t = t1 + (t2 - t1) * j / perSeg;
      var A1x = lerp2(p0[0], p1[0], t0, t1, t), A1y = lerp2(p0[1], p1[1], t0, t1, t);
      var A2x = lerp2(p1[0], p2[0], t1, t2, t), A2y = lerp2(p1[1], p2[1], t1, t2, t);
      var A3x = lerp2(p2[0], p3[0], t2, t3, t), A3y = lerp2(p2[1], p3[1], t2, t3, t);
      var B1x = lerp2(A1x, A2x, t0, t2, t), B1y = lerp2(A1y, A2y, t0, t2, t);
      var B2x = lerp2(A2x, A3x, t1, t3, t), B2y = lerp2(A2y, A3y, t1, t3, t);
      X.push(lerp2(B1x, B2x, t1, t2, t)); Y.push(lerp2(B1y, B2y, t1, t2, t));
    }
  }
  function lerp2(a, b, ta, tb, t) { return a + (b - a) * (t - ta) / (tb - ta); }
  // arc-length table + tangents + signed curvature
  var m = X.length, S = [0], TX = [], TY = [], K = [];
  for (i = 1; i < m; i++) S[i] = S[i - 1] + Math.hypot(X[i] - X[i - 1], Y[i] - Y[i - 1]);
  for (i = 0; i < m; i++) {
    var i0 = Math.max(0, i - 1), i1 = Math.min(m - 1, i + 1);
    var dx = X[i1] - X[i0], dy = Y[i1] - Y[i0], L = Math.hypot(dx, dy) || 1e-9;
    TX[i] = dx / L; TY[i] = dy / L;
  }
  for (i = 0; i < m; i++) {
    i0 = Math.max(0, i - 1); i1 = Math.min(m - 1, i + 1);
    var ds = S[i1] - S[i0] || 1e-9;
    var cr = TX[i0] * TY[i1] - TY[i0] * TX[i1];
    var dt = TX[i0] * TX[i1] + TY[i0] * TY[i1];
    K[i] = Math.atan2(cr, dt) / ds;
  }
  return { pts: pts, X: X, Y: Y, S: S, TX: TX, TY: TY, K: K, n: m, total: S[m - 1] };
}

function trackQuery(tr, s) {
  var S = tr.S, n = tr.n;
  if (s <= 0) s = 0; if (s >= tr.total) s = tr.total;
  var lo = 0, hi = n - 1, mid;
  while (hi - lo > 1) { mid = (lo + hi) >> 1; if (S[mid] > s) hi = mid; else lo = mid; }
  var f = (s - S[lo]) / ((S[hi] - S[lo]) || 1e-9);
  var tx = tr.TX[lo] + (tr.TX[hi] - tr.TX[lo]) * f;
  var ty = tr.TY[lo] + (tr.TY[hi] - tr.TY[lo]) * f;
  var L = Math.hypot(tx, ty) || 1e-9;
  return {
    x: tr.X[lo] + (tr.X[hi] - tr.X[lo]) * f,
    y: tr.Y[lo] + (tr.Y[hi] - tr.Y[lo]) * f,
    tx: tx / L, ty: ty / L,
    k: tr.K[lo] + (tr.K[hi] - tr.K[lo]) * f
  };
}

function closestOnTrack(tr, px, py) {
  var best = -1, bd = Infinity, stride = Math.max(1, Math.floor(tr.n / 260));
  for (var i = 0; i < tr.n; i += stride) {
    var d = (tr.X[i] - px) * (tr.X[i] - px) + (tr.Y[i] - py) * (tr.Y[i] - py);
    if (d < bd) { bd = d; best = i; }
  }
  var lo = Math.max(0, best - stride), hi = Math.min(tr.n - 1, best + stride);
  for (i = lo; i <= hi; i++) {
    d = (tr.X[i] - px) * (tr.X[i] - px) + (tr.Y[i] - py) * (tr.Y[i] - py);
    if (d < bd) { bd = d; best = i; }
  }
  return { s: tr.S[best], dist: Math.sqrt(bd), idx: best };
}

// --- Straight-line segment (2-point track: κ=0 everywhere) -------------------
function linearSample(p0, p1) {
  var dx = p1[0] - p0[0], dy = p1[1] - p0[1];
  var len = Math.hypot(dx, dy) || 1e-9, tx = dx / len, ty = dy / len;
  var N = 40, X = [], Y = [], S = [], TX = [], TY = [], K = [];
  for (var i = 0; i <= N; i++) {
    var t = i / N;
    X.push(p0[0] + dx * t); Y.push(p0[1] + dy * t);
    S.push(len * t); TX.push(tx); TY.push(ty); K.push(0);
  }
  return { pts: [p0, p1], X: X, Y: Y, S: S, TX: TX, TY: TY, K: K, n: N + 1, total: len };
}

// --- Skater stepping ---------------------------------------------------------
function newSkater() {
  return { mode: 'air', s: 0, v: 0, x: 1.6, y: 0, vx: 0, vy: 0,
           eth: 0, em0: 0, angle: 0, face: 1, airT: 0, prevD: 1,
           segIdx: 0, segPrevD: [] };
}
function placeOnTrack(st, tr, s, g) {
  var q = trackQuery(tr, s);
  st.mode = 'track'; st.s = s; st.v = 0; st.eth = 0;
  st.em0 = g * q.y; st.x = q.x; st.y = q.y; st.angle = Math.atan2(q.ty, q.tx);
}
function placeInAir(st, x, y, g) {
  st.mode = 'air'; st.x = x; st.y = y; st.vx = 0; st.vy = 0;
  st.eth = 0; st.em0 = g * y; st.airT = 0; st.prevD = 1; st.angle = 0;
  st.segPrevD = [];
}
function detach(st, tr, g) {
  var q = trackQuery(tr, st.s);
  st.mode = 'air';
  st.x = q.x - q.ty * 0.012; st.y = q.y + q.tx * 0.012;
  st.vx = st.v * q.tx; st.vy = st.v * q.ty;
  st.airT = 0; st.prevD = 1; st.segPrevD = [];
}
// One physics substep. Returns event string or null.
// segs: optional array of segment track objects for multi-segment air landing.
function stepSkater(st, tr, dt, g, b, stick, segs) {
  if (st.mode === 'track') {
    var s = st.s, v = st.v;
    function f(s_, v_) { var q = trackQuery(tr, s_); return [v_, -g * q.ty - b * v_]; }
    var k1 = f(s, v),
        k2 = f(s + dt / 2 * k1[0], v + dt / 2 * k1[1]),
        k3 = f(s + dt / 2 * k2[0], v + dt / 2 * k2[1]),
        k4 = f(s + dt * k3[0], v + dt * k3[1]);
    var sN = s + dt / 6 * (k1[0] + 2 * k2[0] + 2 * k3[0] + k4[0]);
    var vN = v + dt / 6 * (k1[1] + 2 * k2[1] + 2 * k3[1] + k4[1]);
    // thermal work this substep (Simpson over RK4 stage speeds)
    var v2 = (k1[0] * k1[0] + 2 * k2[0] * k2[0] + 2 * k3[0] * k3[0] + k4[0] * k4[0]) / 6;
    st.eth += b * v2 * dt;
    if (sN < 0 || sN > tr.total) {           // rolled off a track end
      st.s = Math.max(0, Math.min(tr.total, sN)); st.v = vN;
      detach(st, tr, g);
      return 'left-end';
    }
    // energy projection: kill integration drift exactly
    var q = trackQuery(tr, sN);
    var ke2 = 2 * (st.em0 - g * q.y - st.eth);
    if (ke2 < 0) { ke2 = 0; }
    var sg = vN > 0 ? 1 : (vN < 0 ? -1 : (v >= 0 ? 1 : -1));
    st.s = sN; st.v = sg * Math.sqrt(ke2);
    st.x = q.x; st.y = q.y; st.angle = Math.atan2(q.ty, q.tx);
    if (Math.abs(st.v) > 0.02) st.face = (st.v * q.tx >= 0) ? 1 : -1;
    if (!stick) {
      var N = st.v * st.v * q.k + g * q.tx;   // normal force / mass on the +n side
      if (N < -1e-9) { detach(st, tr, g); return 'detach'; }
    }
    return null;
  }
  if (st.mode === 'air') {
    st.x += st.vx * dt;
    st.y += st.vy * dt - 0.5 * g * dt * dt;
    st.vy -= g * dt;
    st.airT += dt;
    if (Math.abs(st.vx) > 0.05) st.face = st.vx > 0 ? 1 : -1;
    if (st.y <= 0 && st.vy < 0) {            // land on the ground
      st.eth += 0.5 * st.vy * st.vy;
      st.y = 0; st.mode = 'ground'; st.v = st.vx; st.angle = 0;
      st.em0 = 0.5 * st.v * st.v + st.eth;
      return 'land-ground';
    }
    if (st.airT > 0.04) {                    // land on the track (from the +n side)
      if (segs) {
        for (var si = 0; si < segs.length; si++) {
          var seg = segs[si];
          var c = closestOnTrack(seg, st.x, st.y);
          var q2 = trackQuery(seg, c.s);
          var d = (st.x - q2.x) * (-q2.ty) + (st.y - q2.y) * q2.tx;
          var vn = st.vx * (-q2.ty) + st.vy * q2.tx;
          var prevD = st.segPrevD[si] !== undefined ? st.segPrevD[si] : 1;
          if (prevD > 0 && d <= 0 && c.dist < 0.6 && vn < 0 &&
              c.s > 1e-6 && c.s < seg.total - 1e-6) {
            var vt = st.vx * q2.tx + st.vy * q2.ty;
            st.eth += 0.5 * vn * vn;         // inelastic impact -> thermal
            st.mode = 'track'; st.s = c.s; st.v = vt; st.segIdx = si;
            st.em0 = 0.5 * vt * vt + g * q2.y + st.eth;
            st.x = q2.x; st.y = q2.y; st.angle = Math.atan2(q2.ty, q2.tx);
            st.segPrevD = [];
            return 'land-track';
          }
          st.segPrevD[si] = d;
        }
      } else if (tr) {
        var c = closestOnTrack(tr, st.x, st.y);
        var q2 = trackQuery(tr, c.s);
        var d = (st.x - q2.x) * (-q2.ty) + (st.y - q2.y) * q2.tx;  // signed side
        var vn = st.vx * (-q2.ty) + st.vy * q2.tx;
        if (st.prevD > 0 && d <= 0 && c.dist < 0.6 && vn < 0 &&
            c.s > 1e-6 && c.s < tr.total - 1e-6) {
          var vt = st.vx * q2.tx + st.vy * q2.ty;
          st.eth += 0.5 * vn * vn;           // inelastic impact -> thermal
          st.mode = 'track'; st.s = c.s; st.v = vt;
          st.em0 = 0.5 * vt * vt + g * q2.y + st.eth;
          st.x = q2.x; st.y = q2.y; st.angle = Math.atan2(q2.ty, q2.tx);
          return 'land-track';
        }
        st.prevD = d;
      }
    }
    return null;
  }
  if (st.mode === 'ground') {
    var vOld = st.v;
    if (b > 0) {
      st.v = vOld * Math.exp(-b * dt);
      st.x += vOld * (1 - Math.exp(-b * dt)) / b;
      st.eth += 0.5 * (vOld * vOld - st.v * st.v);
    } else st.x += vOld * dt;
    if (Math.abs(st.v) > 0.02) st.face = st.v > 0 ? 1 : -1;
    return null;
  }
  return null;
}

// Full back-and-forth lap period from rest at s0 (time between successive
// returns to zero speed at the start point). Used by calibration self-test.
function lapTime(tr, s0, g) {
  var st = newSkater(); placeOnTrack(st, tr, s0, g);
  var t = 0, armed = false, crossings = 0, pv = 0;
  for (var i = 0; i < 200000; i++) {
    pv = st.v;
    stepSkater(st, tr, SUBDT, g, 0, true);
    t += SUBDT;
    if (!armed) { if (Math.abs(st.v) > 0.5) armed = true; continue; }
    if ((pv > 0 && st.v <= 0) || (pv < 0 && st.v >= 0)) {
      crossings++;
      if (crossings === 2) return t - SUBDT * Math.abs(st.v) / (Math.abs(pv) + Math.abs(st.v));
      armed = false;
    }
    if (!armed && Math.abs(st.v) > 0.5) armed = true;
  }
  return NaN;
}
// arc position where track height first crosses yTarget going downhill
function sAtHeight(tr, yTarget) {
  for (var i = 1; i < tr.n; i++) {
    if (tr.Y[i - 1] > yTarget && tr.Y[i] <= yTarget) {
      var f = (tr.Y[i - 1] - yTarget) / (tr.Y[i - 1] - tr.Y[i]);
      return tr.S[i - 1] + (tr.S[i] - tr.S[i - 1]) * f;
    }
  }
  return -1;
}
// count interior local minima of track height (stable equilibrium points)
function countStableEquilibria(tr, prominence) {
  prominence = prominence || 0.02;
  var mins = [], n = tr.n;
  for (var i = 2; i < n - 2; i++) {

}

function drawTrack() {
  if (segs) { drawFloatingSegs(); return; }
  // ribbon
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(w2x(track.X[0]), w2y(track.Y[0]));
  for (let i = 1; i < track.n; i++) ctx.lineTo(w2x(track.X[i]), w2y(track.Y[i]));
  ctx.strokeStyle = '#6e6e6e'; ctx.lineWidth = 11; ctx.stroke();
  ctx.strokeStyle = '#a3a3a3'; ctx.lineWidth = 7.5; ctx.stroke();
  // deterministic dashed centerline (the dashes are a measurement landmark)
  const gap = PRESETS[trackKey].dashGap || 0.42, period = DASH + gap;
  ctx.strokeStyle = '#3c3c3c'; ctx.lineWidth = 1.8;
  for (let a = gap; a < track.total; a += period) {
    const b = Math.min(a + DASH, track.total);
    const qa = trackQuery(track, a), qb = trackQuery(track, b);
    ctx.beginPath(); ctx.moveTo(w2x(qa.x), w2y(qa.y));
    for (let i = sIdx(track, a) + 1; i < track.n && track.S[i] < b; i++)
      ctx.lineTo(w2x(track.X[i]), w2y(track.Y[i]));
    ctx.lineTo(w2x(qb.x), w2y(qb.y)); ctx.stroke();
  }
  // control points
  if (PRESETS[trackKey].editable || SHOWDOTS) {
    for (let i = 0; i < pts.length; i++) {
      const px = w2x(pts[i][0]), py = w2y(pts[i][1]);
      ctx.beginPath(); ctx.arc(px, py, 8, 0, 2 * Math.PI);
      ctx.fillStyle = '#d62828'; ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = (PRESETS[trackKey].editable && i === selPt) ? '#ffd166' : '#ffffff';
      ctx.stroke();
      ctx.beginPath(); ctx.arc(px - 2.4, py - 2.6, 2.2, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fill();
    }
  }
}

function drawRefLine() {
  const py = w2y(refY);
  ctx.save(); ctx.setLineDash([8, 6]);
  ctx.strokeStyle = '#0e7c7b'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(CW, py); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  // handle
  ctx.beginPath();
  ctx.moveTo(165, py - 9); ctx.lineTo(174, py); ctx.lineTo(165, py + 9); ctx.lineTo(155, py);
  ctx.closePath();
  ctx.fillStyle = '#0e7c7b'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#0e7c7b'; ctx.font = '11px Segoe UI'; ctx.textAlign = 'left';
  ctx.fillText('reference height ' + refY.toFixed(2) + ' m', 183, py - 5);
}

function drawSkaterFigure(px, py, ang, face, ghost) {
  ctx.save();
  ctx.translate(px, py); ctx.rotate(-ang); ctx.scale(face, 1);
  if (ghost) ctx.globalAlpha = 0.5;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  // wheels + deck
  ctx.fillStyle = '#2e2e2e';
  ctx.beginPath(); ctx.arc(-10, 2, 3.2, 0, 2 * Math.PI); ctx.fill();
  ctx.beginPath(); ctx.arc(10, 2, 3.2, 0, 2 * Math.PI); ctx.fill();
  ctx.strokeStyle = '#4a3826'; ctx.lineWidth = 3.6;
  ctx.beginPath(); ctx.moveTo(-15, -3); ctx.quadraticCurveTo(0, -1.4, 15, -3); ctx.stroke();
  if (charType === 'cat') {
    // tail
    ctx.strokeStyle = '#7a6a58'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-10, -13); ctx.quadraticCurveTo(-19, -18, -17, -28); ctx.stroke();
    // hind + front legs
    ctx.strokeStyle = '#857463'; ctx.lineWidth = 3.6;
    ctx.beginPath(); ctx.moveTo(-7, -12); ctx.lineTo(-8, -4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(7, -13); ctx.lineTo(9, -4); ctx.stroke();
    // body
    ctx.fillStyle = '#8d7b6a';
    ctx.beginPath(); ctx.ellipse(-1, -14, 11.5, 6.5, -0.18, 0, 2 * Math.PI); ctx.fill();
    // head

    // ears
    ctx.beginPath(); ctx.moveTo(5.5, -26); ctx.lineTo(7, -32.5); ctx.lineTo(10, -27.5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(11, -27.5); ctx.lineTo(14.5, -31.5); ctx.lineTo(15, -25.5); ctx.closePath(); ctx.fill();
    // face
    ctx.fillStyle = '#332a22';
    ctx.beginPath(); ctx.arc(12.5, -23, 1.1, 0, 2 * Math.PI); ctx.fill();

  } else {

    ctx.beginPath(); ctx.moveTo(7, -5); ctx.lineTo(7.6, -13); ctx.lineTo(1.5, -18.5); ctx.stroke();
    ctx.strokeStyle = '#2a9d8f'; ctx.lineWidth = 5.6;       // torso (teal top)
    ctx.beginPath(); ctx.moveTo(0.5, -18.5); ctx.lineTo(2.2, -31.5); ctx.stroke();
    ctx.lineWidth = 3.4;                                    // arms
    ctx.beginPath(); ctx.moveTo(1.6, -29.5); ctx.lineTo(-9.5, -35.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(1.6, -29.5); ctx.lineTo(12.5, -25.5); ctx.stroke();
    ctx.fillStyle = '#f1c08e';                              // hands
    ctx.beginPath(); ctx.arc(-10.6, -36.1, 2, 0, 2 * Math.PI); ctx.fill();
    ctx.beginPath(); ctx.arc(13.6, -25.1, 2, 0, 2 * Math.PI); ctx.fill();
    // ponytail

function drawSkater() {
  if (st.mode === 'drag') {
    if (segs) {
      let bestDist = Infinity, bestSeg = 0, bestS = 0;
      for (let i = 0; i < segs.length; i++) {
        const c = closestOnTrack(segs[i], st.x, st.y);
        if (c.dist < bestDist) { bestDist = c.dist; bestSeg = i; bestS = c.s; }
      }
      if (bestDist < 0.45) {
        const q = trackQuery(segs[bestSeg], bestS);
        ctx.beginPath(); ctx.arc(w2x(q.x), w2y(q.y), 5.5, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(230,51,41,0.45)'; ctx.fill();
      }
    } else {
      const c = closestOnTrack(track, st.x, st.y);
      if (c.dist < 0.45) {   // snap preview
        const q = trackQuery(track, c.s);
        ctx.beginPath(); ctx.arc(w2x(q.x), w2y(q.y), 5.5, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(230,51,41,0.45)'; ctx.fill();
      }
    }
    drawSkaterFigure(w2x(st.x), w2y(st.y), 0, st.face, true);
    return;
  }
  if (SHOWXDOT) {
    const gy = w2y(0);
    ctx.beginPath(); ctx.arc(w2x(st.x), gy, 3.6, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(230,51,41,0.5)'; ctx.fill();
    ctx.lineWidth = 1.2; ctx.strokeStyle = 'rgba(122,20,16,0.5)'; ctx.stroke();
  }
  drawSkaterFigure(w2x(st.x), w2y(st.y), st.angle, st.face, false);
}

const BARS_X = 6, BARS_Y = 182, BARS_W = 150, BARS_H = 192, BARS_ZERO = BARS_Y + 140;
function drawBars() {
  const e = energies();
  // smooth full-scale: track the run's total mechanical energy
  const target = Math.max(250, MASS * st.em0 * 1.12, e.tot * 1.12, e.ke * 1.12, Math.abs(e.pe) * 1.12);
  barScale += (target - barScale) * 0.12;
  const pxPerJ = 118 / barScale;
  ctx.fillStyle = 'rgba(255,255,255,0.93)';
  ctx.strokeStyle = '#b9c6d2'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(BARS_X, BARS_Y, BARS_W, BARS_H, 6); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#1d3557'; ctx.font = 'bold 12px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText('Energy (J)', BARS_X + BARS_W / 2, BARS_Y + 15);
  // zero line
  ctx.strokeStyle = '#8b9aa8';
  ctx.beginPath(); ctx.moveTo(BARS_X + 8, BARS_ZERO + 0.5); ctx.lineTo(BARS_X + BARS_W - 8, BARS_ZERO + 0.5); ctx.stroke();
  const items = [
    ['Kinetic', e.ke, '#2eaa3e'], ['Potential', e.pe, '#2b6fd4'],
    ['Thermal', e.th, '#d9542e'], ['Total', e.tot, '#e0b522']
  ];
  for (let i = 0; i < 4; i++) {
    const [name, val, col] = items[i];
    const bx = BARS_X + 16 + i * 33, bw = 22;
    let hpx = val * pxPerJ;
    hpx = Math.max(-44, Math.min(118, hpx));
    ctx.fillStyle = col;
    if (hpx >= 0) ctx.fillRect(bx, BARS_ZERO - hpx, bw, Math.max(hpx, 0.001));
    else ctx.fillRect(bx, BARS_ZERO, bw, -hpx);
    // numeric label
    ctx.fillStyle = '#33454f'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'center';
    const ly = hpx >= 0 ? BARS_ZERO - hpx - 3 : BARS_ZERO - hpx + 10;
    ctx.fillText(String(Math.round(val)), bx + bw / 2, Math.min(Math.max(ly, BARS_Y + 26), BARS_Y + BARS_H - 26));
    // name (rotated)
    ctx.save(); ctx.translate(bx + bw / 2 + 3, BARS_Y + BARS_H - 6); ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = '#5d6f80'; ctx.font = '9.5px Segoe UI'; ctx.textAlign = 'left';
    ctx.fillText(name, 0, 3); ctx.restore();
  }
}

function drawDial() {
  const cx = 235, cy = 66, r = 44;
  const spd = st.mode === 'air' ? Math.hypot(st.vx, st.vy) : (st.mode === 'drag' ? 0 : Math.abs(st.v));
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fill();
  ctx.strokeStyle = '#b9c6d2'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#1d3557'; ctx.font = 'bold 10.5px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText('Speed', cx, cy - r + 16);
  const a0 = Math.PI * 1.17, a1 = -Math.PI * 0.17, VMAX = 15;
  for (let v = 0; v <= VMAX; v++) {
    const a = a0 + (a1 - a0) * v / VMAX, major = v % 5 === 0;
    const r1 = r - (major ? 10 : 6), r2 = r - 3;
    ctx.strokeStyle = '#5d6f80'; ctx.lineWidth = major ? 1.6 : 1;
    ctx.beginPath(); ctx.moveTo(cx + r1 * Math.cos(a), cy - r1 * Math.sin(a));
    ctx.lineTo(cx + r2 * Math.cos(a), cy - r2 * Math.sin(a)); ctx.stroke();
    if (major) {
      ctx.fillStyle = '#33454f'; ctx.font = '9px Segoe UI';
      ctx.fillText(String(v), cx + (r - 17) * Math.cos(a), cy - (r - 17) * Math.sin(a) + 3);
    }
  }
  const av = a0 + (a1 - a0) * Math.min(spd, VMAX) / VMAX;
  ctx.strokeStyle = '#d62828'; ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.moveTo(cx - 6 * Math.cos(av), cy + 6 * Math.sin(av));
  ctx.lineTo(cx + (r - 12) * Math.cos(av), cy - (r - 12) * Math.sin(av)); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, 3, 0, 2 * Math.PI); ctx.fillStyle = '#1d3557'; ctx.fill();
  // digital readout
  ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.strokeStyle = '#b9c6d2'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(cx - 33, cy + r + 4, 66, 18, 4); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#1d3557'; ctx.font = 'bold 12px Segoe UI';
  ctx.fillText(spd.toFixed(1) + ' m/s', cx, cy + r + 17);
}

function drawTape() {
  const x1 = w2x(tape.x1), y1 = w2y(tape.y1), x2 = w2x(tape.x2), y2 = w2y(tape.y2);
  const len = Math.hypot(tape.x2 - tape.x1, tape.y2 - tape.y1);
  // tape line
  ctx.strokeStyle = '#c9a227'; ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  // base body (reel) — transparent center lets scene show through for precise alignment
  ctx.fillStyle = '#e9c46a';
  ctx.beginPath();
  ctx.roundRect(x1 - 9, y1 - 9, 18, 18, 4);
  ctx.arc(x1, y1, 5.5, 0, 2 * Math.PI);  // inner circle punched as hole via evenodd
  ctx.fill('evenodd');
  ctx.beginPath(); ctx.roundRect(x1 - 9, y1 - 9, 18, 18, 4);
  ctx.strokeStyle = '#9c7a18'; ctx.lineWidth = 1.5; ctx.stroke();
  // horizontal reference lines at exact base height, extending left and right of the box
  ctx.strokeStyle = '#7a5c10'; ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(x1 - 22, y1); ctx.lineTo(x1 - 9, y1);
  ctx.moveTo(x1 + 9, y1); ctx.lineTo(x1 + 22, y1);
  ctx.stroke();
  // crosshair ring + arms visible against scene through the transparent center
  ctx.strokeStyle = '#5a3b00'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(x1, y1, 5.5, 0, 2 * Math.PI); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x1 - 9, y1); ctx.lineTo(x1 + 9, y1);
  ctx.moveTo(x1, y1 - 9); ctx.lineTo(x1, y1 + 9);
  ctx.stroke();
  // tip: hollow circle + crosshair (no fill)
  const TR = 7;
  ctx.strokeStyle = '#9c7a18'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x2, y2, TR, 0, 2 * Math.PI); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2 - TR, y2); ctx.lineTo(x2 + TR, y2);
  ctx.moveTo(x2, y2 - TR); ctx.lineTo(x2, y2 + TR);
  ctx.stroke();
  // readout near tip
  const rx = Math.min(CW - 70, Math.max(4, x2 + 12)), ry = Math.max(14, y2 - 12);
  ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.strokeStyle = '#b9c6d2'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(rx, ry - 11, 62, 16, 3); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#7a5c10'; ctx.font = 'bold 11px Segoe UI'; ctx.textAlign = 'left';
  ctx.fillText(len.toFixed(2) + ' m', rx + 5, ry + 1);
}

function drawWatch() {

const PLAY = { x: 250, y: 363, r: 16 }, STEP = { x: 280, y: 363, r: 11 };
const RAD_N = { x: 105, y: 363 }, RAD_S = { x: 183, y: 363 };
const ZOOM_M = { x: 320, y: 363, r: 10 }, ZOOM_P = { x: 345, y: 363, r: 10 };
function drawTransport() {
  // slow-motion radios
  for (const [rd, lbl, on] of [[RAD_N, 'Normal', !slow], [RAD_S, 'Slow', slow]]) {
    ctx.beginPath(); ctx.arc(rd.x, rd.y, 6, 0, 2 * Math.PI);
    ctx.fillStyle = '#fff'; ctx.fill(); ctx.strokeStyle = '#2f6fb3'; ctx.lineWidth = 1.6; ctx.stroke();
    if (on) { ctx.beginPath(); ctx.arc(rd.x, rd.y, 3.2, 0, 2 * Math.PI); ctx.fillStyle = '#2f6fb3'; ctx.fill(); }
    ctx.fillStyle = '#fff'; ctx.font = '14.4px Segoe UI'; ctx.textAlign = 'left';
    ctx.fillText(lbl, rd.x + 10, rd.y + 5);
  }
  // play/pause
  ctx.beginPath(); ctx.arc(PLAY.x, PLAY.y, PLAY.r, 0, 2 * Math.PI);
  ctx.fillStyle = '#2f6fb3'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#fff';
  if (paused) {
    ctx.beginPath(); ctx.moveTo(PLAY.x - 4.5, PLAY.y - 7.5); ctx.lineTo(PLAY.x + 8, PLAY.y);
    ctx.lineTo(PLAY.x - 4.5, PLAY.y + 7.5); ctx.closePath(); ctx.fill();
  } else {
    ctx.fillRect(PLAY.x - 6, PLAY.y - 7, 4.4, 14); ctx.fillRect(PLAY.x + 2, PLAY.y - 7, 4.4, 14);
  }
  // step
  ctx.beginPath(); ctx.arc(STEP.x, STEP.y, STEP.r, 0, 2 * Math.PI);
  ctx.fillStyle = paused ? '#2f6fb3' : 'rgba(47,111,179,0.45)'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.6; ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.moveTo(STEP.x - 5, STEP.y - 5); ctx.lineTo(STEP.x + 2, STEP.y);
  ctx.lineTo(STEP.x - 5, STEP.y + 5); ctx.closePath(); ctx.fill();
  ctx.fillRect(STEP.x + 3, STEP.y - 5, 2.2, 10);
  // zoom controls
  for (const [zb, sym] of [[ZOOM_M, '−'], [ZOOM_P, '+']]) {
    ctx.beginPath(); ctx.arc(zb.x, zb.y, zb.r, 0, 2 * Math.PI);
    ctx.fillStyle = '#2f6fb3'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText(sym, zb.x, zb.y + 5);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = '9px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText(vpZoom.toFixed(1) + '×', (ZOOM_M.x + ZOOM_P.x) / 2, ZOOM_M.y - ZOOM_M.r - 2);
}

function drawHints() {
  ctx.font = '11.5px Segoe UI'; ctx.fillStyle = '#7d97ad'; ctx.textAlign = 'center';
  if (!placedOnce && st.mode === 'ground' && Math.abs(st.v) < 0.01)
    ctx.fillText('Drag ' + (charType === 'cat' ? 'the cat' : 'Emilie') + ' onto the track', w2x(st.x), w2y(st.y) - 58);
  if (PRESETS[trackKey].editable)
    ctx.fillText('Drag the red dots to shape the track', 300, 20);
  if (PRESETS[trackKey].segmentsEditable) {
    const msg = drawSegs.length
      ? 'Drag a piece from the toolbox; drag the red dots to join pieces'
      : 'Drag a track piece from the toolbox to start building';
    ctx.fillText(msg, CW / 2 + 40, 150);

}

// --- Simulation loop -----------------------------------------------------
function doSubstep() {
  const b = fric * FRICTION_SCALE;
  if (segs) {
    const tr2 = st.mode === 'track' ? segs[st.segIdx] : null;
    stepSkater(st, tr2, SUBDT, g,
               (st.mode === 'track' || st.mode === 'ground') ? b : 0, stick,
               st.mode === 'air' ? segs : null);
  } else {
    stepSkater(st, track, SUBDT, g, (st.mode === 'track' || st.mode === 'ground') ? b : 0, stick);
  }
  if (watch.run) watch.t += SUBDT;
}
function frame(ts) {
  if (lastTs === null) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  if (!paused && st.mode !== 'drag') {
    acc += dt * (slow ? 0.25 : 1);
    if (acc > 0.1) acc = 0.1;
    while (acc >= SUBDT) { doSubstep(); acc -= SUBDT; }
  }
  draw();
  requestAnimationFrame(frame);
}

// --- Magnifier -------------------------------------------------------------
// Shown only while dragging a tape-measure endpoint (?mag=1 to enable).
const mag = document.getElementById('mag');
const magCtx = mag.getContext('2d');
magCtx.imageSmoothingEnabled = false;
const MAG_HALF = 24; // half-side of source in backing-store pixels (~38 screen px at 1×)
function updateMag(mx, my, clientX, clientY) {
  // mx, my are logical canvas coords (0..CW × 0..CH)
  const bsX = Math.round(mx * resMult), bsY = Math.round(my * resMult);
  let sx = bsX - MAG_HALF, sy = bsY - MAG_HALF, sw = MAG_HALF * 2, sh = MAG_HALF * 2;
  if (sx < 0) { sw += sx; sx = 0; }
  if (sy < 0) { sh += sy; sy = 0; }
  if (sx + sw > canvas.width) sw = canvas.width - sx;
  if (sy + sh > canvas.height) sh = canvas.height - sy;
  if (sw <= 0 || sh <= 0) { mag.style.display = 'none'; return; }
  magCtx.fillStyle = '#fff'; magCtx.fillRect(0, 0, 128, 128);
  magCtx.imageSmoothingEnabled = false;
  magCtx.drawImage(canvas, sx, sy, sw, sh, 0, 0, 128, 128);
  magCtx.strokeStyle = 'rgba(230,51,41,0.9)'; magCtx.lineWidth = 1;
  magCtx.beginPath();
  magCtx.moveTo(56, 64); magCtx.lineTo(72, 64);
  magCtx.moveTo(64, 56); magCtx.lineTo(64, 72);
  magCtx.stroke();
  const pad = 18;
  let lx = clientX + pad, ly = clientY + pad;
  if (lx + 128 > window.innerWidth) lx = clientX - pad - 128;
  if (ly + 128 > window.innerHeight) ly = clientY - pad - 128;
  mag.style.left = lx + 'px'; mag.style.top = ly + 'px';
  mag.style.display = 'block';
}

// --- Calibration self-test (?selftest=1, results in the console) -------------
function runSelfTest() {
  const out = [];
  const chk = (name, val, lo, hi) =>
    out.push((val >= lo && val <= hi ? 'PASS  ' : 'FAIL  ') + name + ' = ' + val + '  (accept ' + lo + ' .. ' + hi + ')');
  // 1. W lap
  const wTr = catmullSample(PRESETS.w.pts, 90);
  const s0 = sAtHeight(wTr, 4.6);
  chk('W lap from 4.6 m start, g=9.8 (s)', +lapTime(wTr, s0, 9.8).toFixed(3), 5.28, 5.32);
  chk('W dash-2 center = standard start (m)', +(2 * PRESETS.w.dashGap + 1.5 * DASH).toFixed(3), s0 - 0.01, s0 + 0.01);
  // 2. ramp v^2-vs-y fit
  const rTr = catmullSample(PRESETS.ramp.pts, 90);
  const fit = gg => {
    const stt = newSkater(); placeOnTrack(stt, rTr, sAtHeight(rTr, 4.6), gg);
    const ys = [], v2 = []; let t = 0, i = 0;
    while (stt.mode === 'track' && stt.y > 0.7 && t < 20) {
      stepSkater(stt, rTr, SUBDT, gg, 0, true); t += SUBDT;
      if (++i % 12 === 0 && Math.abs(stt.v) > 0.3) { ys.push(stt.y); v2.push(stt.v * stt.v); }
    }
    const n = ys.length, sx = ys.reduce((a, b) => a + b), sy = v2.reduce((a, b) => a + b);
    const sxx = ys.reduce((a, b) => a + b * b, 0), sxy = ys.reduce((a, y, j) => a + y * v2[j], 0);
    const sl = (n * sxy - sx * sy) / (n * sxx - sx * sx);
    return { sl, ic: (sy - sl * sx) / n };
  };
  let f1 = fit(9.8);
  chk('ramp v^2 intercept, g=9.8 (m^2/s^2)', +f1.ic.toFixed(2), 89.5, 90.8);
  chk('ramp v^2 slope = -2g, g=9.8', +f1.sl.toFixed(2), -19.7, -19.5);
  chk('ramp run to v^2=0 (m)', +(-f1.ic / f1.sl).toFixed(3), 4.59, 4.61);
  f1 = fit(13.3);
  chk('ramp v^2 intercept, g=13.3', +f1.ic.toFixed(1), 121.7, 123.0);
  // 3. kitty equilibria
  chk('kitty stable equilibria (of 8 ctrl pts)', countStableEquilibria(catmullSample(PRESETS.kitty.pts, 90), 0.02).length, 3, 3);
  chk('U valley equilibria', countStableEquilibria(catmullSample(PRESETS.u.pts, 90), 0.02).length, 1, 1);
  // 4. steps scenario at g=10, stick off
  const sTr = catmullSample(PRESETS.steps.pts, 70);
  const runSteps = f => {
    const stt = newSkater(); placeOnTrack(stt, sTr, 0.001, 10);
    let t = 0, L = [], turn = null, pv;
    while (t < 25) {
      pv = stt.v;
      const ev = stepSkater(stt, sTr, SUBDT, 10, stt.mode === 'track' ? f * FRICTION_SCALE : 0, false);
      t += SUBDT;
      if (ev === 'detach' || ev === 'left-end') L.push({ x: stt.x, sp: Math.hypot(stt.vx, stt.vy) });
      if (L.length && stt.mode === 'track' && !turn && pv > 1e-9 && stt.v <= 0) { turn = stt.x; break; }
      if (stt.mode === 'ground') break;
    }
    return { L, turn };
  };
  const r0 = runSteps(0);
  chk('steps launch speed, frictionless (m/s)', +r0.L[0].sp.toFixed(3), 4.295, 4.306);
  chk('steps launch KE label (J)', Math.round(30 * r0.L[0].sp * r0.L[0].sp), 555, 555);
  chk('steps far-edge speed, frictionless (m/s)', +r0.L[1].sp.toFixed(3), 2.19, 2.21);
  chk('steps far-edge KE label (J)', Math.round(30 * r0.L[1].sp * r0.L[1].sp), 145, 145);
  const r1 = runSteps(0.0089);
  chk('steps launch speed at friction 0.0089', +r1.L[0].sp.toFixed(3), 3.69, 3.71);
  chk('steps stop-at-edge gap (m, vs lip x=' + r0.L[1].x.toFixed(2) + ')', +(r1.turn - r0.L[1].x).toFixed(3), -0.12, 0.05);
  // 5. floating ramps scenario at g=10, stick off
  const fsTr = PRESETS.float.segments.map(s => linearSample(s[0], s[1]));
  const runFloat = f => {
    const stt = newSkater(); stt.segIdx = 0; stt.segPrevD = [];
    placeOnTrack(stt, fsTr[0], 0.001, 10);
    let t = 0, L = [];
    while (t < 25) {
      const tr2 = stt.mode === 'track' ? fsTr[stt.segIdx] : null;
      const b2 = stt.mode === 'track' ? f * FRICTION_SCALE : 0;
      const ev2 = stepSkater(stt, tr2, SUBDT, 10, b2, false,
                              stt.mode === 'air' ? fsTr : null);
      t += SUBDT;
      if (ev2 === 'left-end') L.push({ x: stt.x, sp: Math.hypot(stt.vx, stt.vy) });
      if (L.length >= 2 || stt.mode === 'ground' || stt.y < -0.5) break;
    }
    return { L };
  };
  const rf0 = runFloat(0);
  chk('float-ramps launch speed, frictionless (m/s)', +rf0.L[0].sp.toFixed(3), 4.295, 4.310);
  chk('float-ramps launch KE label (J)', Math.round(30 * rf0.L[0].sp * rf0.L[0].sp), 555, 555);
  chk('float-ramps far-edge speed, frictionless (m/s)', +rf0.L[1].sp.toFixed(3), 2.19, 2.21);
  chk('float-ramps far-edge KE label (J)', Math.round(30 * rf0.L[1].sp * rf0.L[1].sp), 145, 145);
  const rf1 = runFloat(0.0089);
  chk('float-ramps friction=0.0089 launch (m/s)', +rf1.L[0].sp.toFixed(3), 3.69, 3.71);
  console.log('Skate Park calibration self-test\n' + out.join('\n'));
  return out;
}

// --- RESPONSIVE FIT CONTROLLER ----------------------------------------------
// Two independent jobs:
//   (1) REPORT a height to the AoPS classroom. The classroom sizes the iframe
//       (and the sticky that holds it) to exactly the height we post, with NO
//       upper clamp of its own — so an unbounded, width-derived height balloons
//       past the visible sticky and "spills" down the feed. We therefore BOUND
//       what we report. It never exceeds a sticky-safe ceiling.
//         ?h=NNN    -> always report exactly NNN px (set the sticky height you
//                      want; the sim then fills that box).
//         otherwise -> the sim-shaped height for the current width, but capped
//                      at ?maxh (default 320) so it can't overrun a sticky.
//   (2) SCALE #stage to fit whatever box we actually occupy (preserve aspect
//       ratio, centre, cap the zoom). This is what makes it responsive: it
//       fills the width it's given and is never cut off. The render-scale cap
//       is independent of the reported height, so the stand-alone window view
//       can still grow large while the embedded height stays sticky-safe.
const stage = document.getElementById('stage');
const MAXW = qNum('maxw', 860);          // px — widest the sim may render
const MAXSCALE = qNum('maxscale', 2.4);  // absolute cap on the zoom factor
const FIXED_H = qNum('h', 0);            // >0 => always report exactly this many px
const REPORT_MAX = qNum('maxh', 320);    // px ceiling on the reported height (anti-spill)
const REPORT_MIN = 140;                  // px floor (avoid a degenerate sliver)
let lastReport = 0;
function fitStage() {
  const natW = stage.offsetWidth || (CLEAN ? 384 : 584);   // untransformed layout size
  const natH = stage.offsetHeight || 304;
  const vw = document.documentElement.clientWidth;
  const vh = document.documentElement.clientHeight;
  const cap = Math.min(MAXSCALE, MAXW / natW);   // render-scale ceiling (height-independent)
  // (1) Height to report. An explicit ?h= is honoured as-is (sane bounds only);
  //     otherwise use the sim-shaped height for this width, capped so it can
  //     never overrun a sticky.
  let reportH;
  if (FIXED_H > 0) {
    reportH = Math.max(80, Math.min(2000, FIXED_H));
  } else {
    reportH = Math.round(natH * Math.min(vw / natW, cap));
    reportH = Math.max(REPORT_MIN, Math.min(REPORT_MAX, reportH));
  }
  if (Math.abs(reportH - lastReport) >= 2) {
    lastReport = reportH;
    try { window.parent.postMessage({ type: 'resize', height: reportH }, '*'); } catch (e) {}
  }
  // (2) Scale to fit the box we actually occupy (sticky/iframe or window).
  let s = Math.min(vw / natW, vh / natH, cap);
  if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);   // first paint, before parent honours the report
  stage.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
  setRes(s * dpr);                          // keep the canvas crisp when enlarged
}
window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', fitStage);
if (window.ResizeObserver) new ResizeObserver(fitStage).observe(document.documentElement);
window.addEventListener('load', fitStage);
if (document.fonts && document.fonts.ready) document.fonts.ready.then(fitStage);

// --- Boot ----------------------------------------------------------------
initFromParams();
fitStage();
if (qFlag('selftest', false)) setTimeout(runSelfTest, 50);
requestAnimationFrame(frame);
// Debug helpers exposed for capture scripts
window.__espStep = () => { for (let i = 0; i < 4; i++) doSubstep(); draw(); };
window.__espSteps = (n) => { for (let i = 0; i < n; i++) { for (let j = 0; j < 4; j++) doSubstep(); } draw(); };
window.__espPause = () => { paused = true; draw(); };
window.__espUnpause = () => { paused = false; };
window.__espGetState = () => ({ mode: st.mode, s: st.s, v: st.v, x: st.x, y: st.y, vx: st.vx, vy: st.vy, eth: st.eth, segIdx: st.segIdx });
window.__espCanvas = () => document.querySelector('canvas').toDataURL('image/png');
window.__espCanvasJpeg = (q) => document.querySelector('canvas').toDataURL('image/jpeg', q || 0.92);
window.__espDownload = (filename, mime, quality) => {
  const canvas = document.querySelector('canvas');
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, mime || 'image/png', quality || 0.92);
};
})();
</script>

  function buildCleanUrl(overrides) {

    for (var k in overrides) {

    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }

  function buildCheatUrl(overrides) {
    var base = buildCleanUrl(overrides);
    return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';

      if (def.step !== undefined) inp.step = String(def.step);
      inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 6px;width:90px;font-size:12px;font-family:inherit';
