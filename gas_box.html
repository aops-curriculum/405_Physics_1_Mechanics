<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gas in a Box</title>
  <!-- Original AoPS interactive. Replaces the third-party "Gas Properties" simulation. -->
<script>
// responsive-scale-to-fit v1 -- replaces fixed-size embedding + EigenNode auto-height.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given, preserving aspect ratio, centred, capped at a maximum zoom. Pointer
// math is unchanged: offsetX/offsetY and getBoundingClientRect-ratio mapping
// are both correct under a CSS transform. Tunable per embed: ?maxscale= (zoom
// cap), ?maxw= (px width cap), ?h= (exact reported height), ?maxh= (anti-spill
// report ceiling). NOTE: the AoPS live-chat embed sizes the iframe from its
// height= attribute and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px; height: 340px; overflow: hidden;
      background: #f4f6fa;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas { display: block; }
    #ui {
      width: 420px; height: 38px; padding: 0 8px;
      font-size: 11px; color: #334455;
      display: flex; align-items: center; gap: 8px;
    }
    button {
      font-family: inherit; font-size: 11px; padding: 2px 8px;
      border: 1px solid #b8c4d4; border-radius: 4px;
      background: #ffffff; color: #334455; cursor: pointer;
    }
    button:hover { background: #eef3f9; }
    label { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
    input[type=range] { vertical-align: middle; }
  </style>
</head>
<body>
  <canvas id="c" width="420" height="302"></canvas>
  <div id="ui">
    <button id="playBtn">&#10074;&#10074;</button>
    <button id="resetBtn">&#8634;</button>
    <label>Temperature
      <input type="range" id="temp" min="50" max="600" step="5" value="300" style="width:130px">
    </label>
    <span id="tempVal" style="min-width:44px">300 K</span>
  </div>
  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 420, H = 302;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);

    // Box interior (gas region)
    const BL = 14, BR = 320, BT = 34, BB = 292;
    const AREA = (BR - BL) * (BB - BT);
    const PERIM = 2 * ((BR - BL) + (BB - BT));
    const PR = 3.2;                       // particle radius, px

    const T_DEFAULT = 300;
    const VRMS300 = 95;                   // rms speed (px/s) at 300 K
    const N_DEFAULT = 120;
    const SUBDT = 1 / 240;

    const Q = new URLSearchParams(location.search);
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const N = clamp(Math.round(parseFloat(Q.get('n')) || N_DEFAULT), 10, 250);
    const T0 = clamp(Math.round(parseFloat(Q.get('T')) || T_DEFAULT), 50, 600);

    // Reference pressure (impulse/s per px of wall) for the gauge: the
    // 2-D ideal-gas value N m <v^2> / (2 A) at 300 K with the default count.
    const P_REF = N_DEFAULT * VRMS300 * VRMS300 / (2 * AREA);   // reads 15.0 atm

    // ── Deterministic RNG ────────────────────────────────────
    function mulberry32(a) {
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        let t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    // ── State ────────────────────────────────────────────────
    const px = new Float64Array(N), py = new Float64Array(N);
    const vx = new Float64Array(N), vy = new Float64Array(N);
    let playing = Q.get('paused') === '1' ? false : true;
    let impulse = 0;       // accumulated wall impulse since last frame
    let pSmooth = 0;       // smoothed pressure (impulse/s/px)
    let stepAcc = 0;

    const vrmsAt = T => VRMS300 * Math.sqrt(T / 300);

    function meanV2() {
      let s = 0;
      for (let i = 0; i < N; i++) s += vx[i] * vx[i] + vy[i] * vy[i];
      return s / N;
    }

    function initParticles(T) {
      const rnd = mulberry32(20260611);
      // non-overlapping positions
      for (let i = 0; i < N; i++) {
        let ok = false, tries = 0;
        while (!ok && tries++ < 400) {
          px[i] = BL + PR + rnd() * (BR - BL - 2 * PR);
          py[i] = BT + PR + rnd() * (BB - BT - 2 * PR);
          ok = true;
          for (let j = 0; j < i; j++) {
            const dx = px[i] - px[j], dy = py[i] - py[j];
            if (dx * dx + dy * dy < (2.4 * PR) * (2.4 * PR)) { ok = false; break; }
          }
        }
      }
      // Maxwell-ish velocities (Box-Muller), then rescale to the exact T
      const sigma = vrmsAt(T) / Math.SQRT2;
      for (let i = 0; i < N; i++) {
        const u1 = Math.max(1e-12, rnd()), u2 = rnd();
        const g = Math.sqrt(-2 * Math.log(u1));
        vx[i] = sigma * g * Math.cos(2 * Math.PI * u2);
        vy[i] = sigma * g * Math.sin(2 * Math.PI * u2);
      }
      const scale = vrmsAt(T) / Math.sqrt(meanV2());
      for (let i = 0; i < N; i++) { vx[i] *= scale; vy[i] *= scale; }
      impulse = 0;
      pSmooth = P_REF * (T / 300) * (N / N_DEFAULT);
    }

    function setTemperature(T) {
      const scale = vrmsAt(T) / Math.sqrt(meanV2());
      for (let i = 0; i < N; i++) { vx[i] *= scale; vy[i] *= scale; }
    }

    // ── Physics ──────────────────────────────────────────────
    function substep(h) {
      for (let i = 0; i < N; i++) {
        px[i] += vx[i] * h;
        py[i] += vy[i] * h;
        // walls (elastic; impulse recorded for the pressure gauge)
        if (px[i] < BL + PR) { px[i] = 2 * (BL + PR) - px[i]; impulse += 2 * Math.abs(vx[i]); vx[i] = -vx[i]; }
        else if (px[i] > BR - PR) { px[i] = 2 * (BR - PR) - px[i]; impulse += 2 * Math.abs(vx[i]); vx[i] = -vx[i]; }
        if (py[i] < BT + PR) { py[i] = 2 * (BT + PR) - py[i]; impulse += 2 * Math.abs(vy[i]); vy[i] = -vy[i]; }
        else if (py[i] > BB - PR) { py[i] = 2 * (BB - PR) - py[i]; impulse += 2 * Math.abs(vy[i]); vy[i] = -vy[i]; }
      }
      // pairwise elastic collisions (equal masses: swap normal components)
      const d2max = 4 * PR * PR;
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const dx = px[j] - px[i], dy = py[j] - py[i];
          const d2 = dx * dx + dy * dy;
          if (d2 >= d2max || d2 === 0) continue;
          const d = Math.sqrt(d2), nx = dx / d, ny = dy / d;
          const rel = (vx[i] - vx[j]) * nx + (vy[i] - vy[j]) * ny;
          if (rel <= 0) continue;          // moving apart already
          vx[i] -= rel * nx; vy[i] -= rel * ny;
          vx[j] += rel * nx; vy[j] += rel * ny;
          const push = (2 * PR - d) / 2 + 0.01;
          px[i] -= push * nx; py[i] -= push * ny;
          px[j] += push * nx; py[j] += push * ny;
        }
      }
    }

    // ── Drawing ──────────────────────────────────────────────
    function drawBox() {
      ctx.fillStyle = '#0b0d16';
      ctx.fillRect(BL, BT, BR - BL, BB - BT);
      ctx.strokeStyle = '#b9c0cc'; ctx.lineWidth = 5;
      ctx.strokeRect(BL - 2.5, BT - 2.5, BR - BL + 5, BB - BT + 5);
      ctx.strokeStyle = '#8d96a6'; ctx.lineWidth = 1;
      ctx.strokeRect(BL - 5, BT - 5, BR - BL + 10, BB - BT + 10);
    }

    function drawParticles() {
      ctx.fillStyle = '#8fc4ff';
      for (let i = 0; i < N; i++) {
        ctx.beginPath(); ctx.arc(px[i], py[i], PR, 0, Math.PI * 2); ctx.fill();
      }
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      for (let i = 0; i < N; i++) {
        ctx.beginPath(); ctx.arc(px[i] - 1, py[i] - 1, 1.1, 0, Math.PI * 2); ctx.fill();
      }
    }

    function drawThermometer(T) {
      const x = 252, stemTop = 8, stemBot = 40, bulbY = 47, bulbR = 7.5;
      // mount hole through the top wall
      ctx.fillStyle = '#7d8696';
      ctx.fillRect(x - 6, BT - 6, 12, 8);
      // bulb (inside the gas)
      ctx.beginPath(); ctx.arc(x, bulbY, bulbR, 0, Math.PI * 2);
      ctx.fillStyle = '#d8453a'; ctx.fill();
      ctx.strokeStyle = '#f0f2f6'; ctx.lineWidth = 1.6; ctx.stroke();
      // stem
      ctx.fillStyle = '#f7f8fa';
      ctx.strokeStyle = '#9aa3b2'; ctx.lineWidth = 1.2;
      const r = 5;
      ctx.beginPath();
      ctx.moveTo(x - r, stemBot + 4);
      ctx.lineTo(x - r, stemTop + r);
      ctx.arc(x, stemTop + r, r, Math.PI, 0);
      ctx.lineTo(x + r, stemBot + 4);
      ctx.fill(); ctx.stroke();
      // mercury column, height ∝ T
      const frac = clamp(T / 600, 0.05, 1);
      const colTop = stemBot + 4 - (stemBot + 4 - (stemTop + 3)) * frac;
      ctx.fillStyle = '#d8453a';
      ctx.fillRect(x - 2, colTop, 4, stemBot + 4 - colTop);
      // scale ticks
      ctx.strokeStyle = '#9aa3b2'; ctx.lineWidth = 1;
      ctx.beginPath();
      for (let k = 0; k <= 4; k++) {
        const ty = stemTop + 4 + k * (stemBot - stemTop - 4) / 4;
        ctx.moveTo(x + r, ty); ctx.lineTo(x + r + 3, ty);
      }
      ctx.stroke();
      // readout
      ctx.fillStyle = '#334455'; ctx.font = 'bold 11px Segoe UI'; ctx.textAlign = 'left';
      ctx.fillText(Math.round(T) + ' K', x + 13, 18);
    }

    function drawGauge(atm) {
      const cx = 368, cy = 72, R = 32;
      // sweep: 0 atm at 150°, 40 atm at 390°
      const a0 = Math.PI * 150 / 180, a1 = Math.PI * 390 / 180;
      ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff'; ctx.fill();
      ctx.strokeStyle = '#8d96a6'; ctx.lineWidth = 3; ctx.stroke();
      // ticks every 5 atm
      ctx.strokeStyle = '#556070'; ctx.lineWidth = 1.2;
      ctx.beginPath();
      for (let v = 0; v <= 40; v += 5) {
        const a = a0 + (a1 - a0) * v / 40;
        const big = v % 10 === 0;
        ctx.moveTo(cx + Math.cos(a) * (R - (big ? 8 : 5)), cy + Math.sin(a) * (R - (big ? 8 : 5)));
        ctx.lineTo(cx + Math.cos(a) * (R - 2), cy + Math.sin(a) * (R - 2));
      }
      ctx.stroke();
      // needle
      const a = a0 + (a1 - a0) * clamp(atm, 0, 40) / 40;
      ctx.strokeStyle = '#d8453a'; ctx.lineWidth = 2.2; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx - Math.cos(a) * 6, cy - Math.sin(a) * 6);
      ctx.lineTo(cx + Math.cos(a) * (R - 9), cy + Math.sin(a) * (R - 9));
      ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#333a45'; ctx.fill();
      // labels
      ctx.fillStyle = '#334455'; ctx.font = 'bold 11px Segoe UI'; ctx.textAlign = 'center';
      ctx.fillText('Pressure', cx, cy + R + 16);
      ctx.font = '11px Segoe UI';
      ctx.fillText(atm.toFixed(1) + ' atm', cx, cy + R + 30);
    }

    function drawPump() {
      ctx.save();
      // hose from the pump to the box wall
      ctx.strokeStyle = '#8d96a6'; ctx.lineWidth = 5; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(358, 268);
      ctx.bezierCurveTo(338, 268, 330, 268, 323, 268);
      ctx.stroke();
      // T-handle
      ctx.fillStyle = '#c0392b';
      ctx.strokeStyle = '#7c241a'; ctx.lineWidth = 1;
      ctx.fillRect(346, 148, 44, 8); ctx.strokeRect(346, 148, 44, 8);
      // rod
      ctx.fillStyle = '#aab2bf';
      ctx.fillRect(365, 156, 6, 42);
      // barrel
      const g = ctx.createLinearGradient(354, 0, 382, 0);
      g.addColorStop(0, '#9aa3b2'); g.addColorStop(0.5, '#dde2ea'); g.addColorStop(1, '#9aa3b2');
      ctx.fillStyle = g;
      ctx.strokeStyle = '#717a89'; ctx.lineWidth = 1.2;
      ctx.fillRect(354, 198, 28, 84); ctx.strokeRect(354, 198, 28, 84);
      ctx.fillStyle = '#717a89';
      ctx.fillRect(351, 194, 34, 6);
      // base
      ctx.fillStyle = '#717a89';
      ctx.fillRect(346, 282, 44, 7);
      ctx.restore();
    }

    function draw(T, atm) {
      ctx.fillStyle = '#f4f6fa';
      ctx.fillRect(0, 0, W, H);
      drawBox();
      drawParticles();
      drawThermometer(T);
      drawGauge(atm);
      drawPump();
    }

    // ── Animation loop ───────────────────────────────────────
    let lastTs = null;
    function frame(ts) {
      if (lastTs === null) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;
      if (playing && dt > 0) {
        stepAcc += dt;
        let n = Math.floor(stepAcc / SUBDT);
        if (n > 30) n = 30;
        stepAcc -= n * SUBDT;
        for (let k = 0; k < n; k++) substep(SUBDT);
        if (n > 0) {
          const inst = impulse / (n * SUBDT) / PERIM;
          impulse = 0;
          const alpha = 1 - Math.exp(-(n * SUBDT) / 0.8);
          pSmooth += (inst - pSmooth) * alpha;
        }
      }
      const Tmeas = 300 * meanV2() / (VRMS300 * VRMS300);
      const atm = 15 * pSmooth / P_REF;
      draw(Tmeas, atm);
      requestAnimationFrame(frame);
    }

    // ── Controls ─────────────────────────────────────────────
    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');
    const tempSl = document.getElementById('temp');
    const tempVal = document.getElementById('tempVal');

    function updatePlayBtn() {
      playBtn.innerHTML = playing ? '&#10074;&#10074;' : '&#9654;';
    }
    playBtn.addEventListener('click', () => { playing = !playing; updatePlayBtn(); });
    resetBtn.addEventListener('click', () => {
      tempSl.value = T0;
      tempVal.textContent = T0 + ' K';
      initParticles(T0);
    });
    tempSl.addEventListener('input', () => {
      const T = parseFloat(tempSl.value);
      tempVal.textContent = Math.round(T) + ' K';
      setTemperature(T);
    });

    tempSl.value = T0;
    tempVal.textContent = T0 + ' K';
    initParticles(T0);
    updatePlayBtn();
    requestAnimationFrame(frame);
  })();
  </script>




<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var CHEAT_DEFS = [
    {
        "name": "n",
        "type": "number",
        "min": 10,
        "max": 250,
        "step": 1,
        "default": 80,
        "desc": "Number of particles"
    },
    {
        "name": "T",
        "type": "number",
        "min": 50,
        "max": 600,
        "step": 10,
        "default": 300,
        "desc": "Temperature (K)"
    },
    {
        "name": "paused",
        "type": "toggle",
        "default": 0,
        "desc": "Start paused"
    },
    {
        "name": "maxscale",
        "type": "number",
        "min": 0.5,
        "max": 5,
        "step": 0.1,
        "default": 2.4,
        "desc": "Max zoom factor for responsive scaling"
    },
    {
        "name": "maxw",
        "type": "number",
        "min": 200,
        "max": 2000,
        "step": 50,
        "default": "",
        "desc": "Max rendered width (px); 0 = uncapped"
    },
    {
        "name": "h",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": "",
        "desc": "Exact reported iframe height (px); overrides auto"
    },
    {
        "name": "maxh",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": 320,
        "desc": "Ceiling on auto-reported iframe height (px)"
    }
];

  var EMBED_KEYS = ['cheat'];

  // Build clean URL (no embed/cheat params) with optional overrides
  function buildCleanUrl(overrides) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function (k) { p.delete(k); });
    for (var k in overrides) {
      var v = overrides[k];
      if (v === null || v === '') p.delete(k);
      else p.set(k, v);
    }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }

  function buildCheatUrl(overrides) {
    var base = buildCleanUrl(overrides);
    return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }

  var urlLinkEl = null; // set after render

  function updateUrlDisplay(overrides) {
    if (!urlLinkEl) return;
    var u = buildCleanUrl(overrides || {});
    urlLinkEl.href = u;
    urlLinkEl.textContent = u;
  }

  // Resolve the effective current value of a param (may differ from raw URL string)
  function getEffective(def) {
    var raw = _cpQ.get(def.name);
    if (raw === null) return def['default'] !== undefined ? String(def['default']) : '';
    return raw;
  }

  function isTruthy(v) {
    return v !== '0' && v !== 'false' && v !== 'no' && v !== 'off' && v !== '';
  }

  function makeControl(def) {
    var effective = getEffective(def);

    if (def.type === 'toggle') {
      var on = isTruthy(effective);
      var btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:' + (on ? '#1b3d1b' : '#3d1b1b') + ';color:' +
        (on ? '#6dca80' : '#e07070') + ';border:1px solid ' +
        (on ? '#2a7a3a' : '#8a2a2a') + ';border-radius:3px;padding:3px 10px;' +
        'cursor:pointer;font-size:12px;font-family:inherit;min-width:70px';
      btn.addEventListener('click', function () {
        var updates = {};
        updates[def.name] = on ? '0' : '1';
        window.location.href = buildCheatUrl(updates);
      });
      return btn;
    }

    if (def.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 8px;font-size:12px;font-family:inherit;cursor:pointer';
      def.values.forEach(function (v) {
        var opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        if (effective === String(v)) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', function () {
        var updates = {}; updates[def.name] = sel.value;
        window.location.href = buildCheatUrl(updates);
      });
      return sel;
    }

    if (def.type === 'number') {
      var inp = document.createElement('input');
      inp.type = 'number';
      inp.value = effective;
      if (def.min !== undefined) inp.min = String(def.min);
      if (def.max !== undefined) inp.max = String(def.max);
      if (def.step !== undefined) inp.step = String(def.step);
      inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 6px;width:90px;font-size:12px;font-family:inherit';
      inp.addEventListener('change', function () {
        var updates = {}; updates[def.name] = inp.value;
        window.location.href = buildCheatUrl(updates);
      });
      return inp;
    }

    // text
    var inp2 = document.createElement('input');
    inp2.type = 'text';
    inp2.value = effective;
    inp2.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
      'border-radius:3px;padding:3px 6px;width:220px;font-size:12px;font-family:inherit';
    inp2.addEventListener('change', function () {
      var updates = {}; updates[def.name] = inp2.value;
      window.location.href = buildCheatUrl(updates);
    });
    return inp2;
  }

  function typeLabel(def) {
    if (def.type === 'toggle') return '0 | 1';
    if (def.type === 'select') return def.values.join(' | ');
    if (def.type === 'number') {
      var s = 'number';
      if (def.min !== undefined && def.max !== undefined) s = def.min + '–' + def.max;
      else if (def.min !== undefined) s = '≥' + def.min;
      else if (def.max !== undefined) s = '≤' + def.max;
      return s;
    }
    return 'text';
  }

  function render() {
    // Panel container (fixed at bottom)
    var panel = document.createElement('div');
    panel.id = 'cheat-panel';
    panel.style.cssText = [
      'position:fixed', 'bottom:0', 'left:0', 'right:0',
      'background:rgba(12,18,32,0.97)',
      'color:#c8d8e8',
      'font-family:"Segoe UI",system-ui,monospace',
      'font-size:13px',
      'border-top:2px solid #3a7bd5',
      'z-index:2147483647',
      'max-height:48vh',
      'overflow-y:auto',
      'padding:10px 16px 14px',
      'box-sizing:border-box',
      'box-shadow:0 -4px 24px rgba(0,0,0,0.6)'
    ].join(';');

    // Title bar
    var title = document.createElement('div');
    title.style.cssText = 'font-weight:bold;font-size:13px;color:#7ab8f5;margin-bottom:8px;' +
      'display:flex;align-items:center;justify-content:space-between';
    var titleText = document.createElement('span');
    titleText.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '×';
    closeBtn.title = 'Close cheat panel (reload to restore)';
    closeBtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;' +
      'cursor:pointer;padding:0 4px;line-height:1';
    closeBtn.addEventListener('click', function () { panel.remove(); });
    title.appendChild(titleText);
    title.appendChild(closeBtn);
    panel.appendChild(title);

    // Table
    var table = document.createElement('table');
    table.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var thead = table.createTHead();
    var hrow = thead.insertRow();
    ['Parameter', 'Type / Values', 'Control', 'Description'].forEach(function (h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;' +
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;' +
        'white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = table.createTBody();
    CHEAT_DEFS.forEach(function (def) {
      var row = tbody.insertRow();
      var isSet = _cpQ.has(def.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;' +
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');

      // Name cell
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;' +
        'color:' + (isSet ? '#a8d4ff' : '#7fa8d0') + ';white-space:nowrap;font-family:monospace';
      nc.textContent = def.name;

      // Type cell
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;' +
        'max-width:200px;font-family:monospace';
      tc.textContent = typeLabel(def);

      // Control cell
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(def));

      // Desc cell
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (def.desc || '') + (def['default'] !== undefined
        ? ' (default: ' + def['default'] + ')' : '');
    });
    panel.appendChild(table);

    // URL display
    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;' +
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var urlLabel = document.createElement('span');
    urlLabel.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;' +
      'letter-spacing:0.06em;white-space:nowrap;flex-shrink:0';
    urlLabel.textContent = 'URL:';
    urlLinkEl = document.createElement('a');
    urlLinkEl.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;' +
      'font-family:monospace;text-decoration:none';
    urlLinkEl.addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = buildCheatUrl({});
    });
    var copyBtn = document.createElement('button');
    copyBtn.textContent = 'copy';
    copyBtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;' +
      'border-radius:3px;padding:2px 8px;font-size:11px;font-family:inherit;cursor:pointer;' +
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    copyBtn.addEventListener('click', function () {
      var url = urlLinkEl ? urlLinkEl.href : buildCleanUrl({});
      navigator.clipboard.writeText(url).then(function () {
        copyBtn.textContent = 'copied!';
        copyBtn.style.color = '#6dca80';
        setTimeout(function () { copyBtn.textContent = 'copy'; copyBtn.style.color = '#7ab8f5'; }, 1500);
      }).catch(function () {
        copyBtn.textContent = 'failed';
        setTimeout(function () { copyBtn.textContent = 'copy'; }, 1500);
      });
    });
    updateUrlDisplay();
    urlBox.appendChild(urlLabel);
    urlBox.appendChild(urlLinkEl);
    urlBox.appendChild(copyBtn);
    panel.appendChild(urlBox);

    document.body.appendChild(panel);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>
</body>
</html>
