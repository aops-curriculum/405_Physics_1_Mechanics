<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Measure</title>
  <!-- Original AoPS interactive. Faithful 2D replacement for the hand-written
       GlowScript "measure*" programs (measurebike / measurebounce / measurecans /
       measurelantern): show a photo, click-and-drag to measure a distance on it.
       The photo comes from ?img=<url>; the read-out is in the image's own pixels
       (consistent, so distance ratios match regardless of display size). -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #fff; font-family: 'Segoe UI', system-ui, sans-serif;
                 user-select: none; -webkit-user-select: none; }
    canvas { display: block; touch-action: none; cursor: crosshair; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// EigenNode auto-height v2.4 (report content height to the embedding iframe)
(function() {
  var BUFFER = 4, H_SCROLLBAR = 18, measuring = false;
  function measure() {
    if (measuring) return 0;
    var b = document.body, h = document.documentElement;
    if (!b) return 0;
    measuring = true;
    var hOld = b.style.height, hPri = b.style.getPropertyPriority('height');
    var mOld = b.style.minHeight, mPri = b.style.getPropertyPriority('min-height');
    b.style.setProperty('height', 'auto', 'important');
    b.style.setProperty('min-height', '0', 'important');
    var content = b.scrollHeight || 0;
    if (hOld) b.style.setProperty('height', hOld, hPri); else b.style.removeProperty('height');
    if (mOld) b.style.setProperty('min-height', mOld, mPri); else b.style.removeProperty('min-height');
    measuring = false;
    var hOverflow = h && (h.scrollWidth - h.clientWidth) >= 4;
    return Math.ceil(content) + BUFFER + (hOverflow ? H_SCROLLBAR : 0);
  }
  var last = 0;
  function report() {
    var hgt = measure();
    if (hgt > 0 && Math.abs(hgt - last) >= 2) {
      last = hgt;
      window.parent.postMessage({ type: 'resize', height: hgt }, '*');
    }
  }
  window.addEventListener('load', report);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(report);
  if (window.ResizeObserver && document.body) new ResizeObserver(report).observe(document.body);
})();
</script>
<script>
(() => {
  'use strict';
  const qs = new URLSearchParams(location.search);
  const IMG = qs.get('img');
  const UNIT = qs.get('unit') || 'pixels';
  const KCAL = parseFloat(qs.get('k'));      // optional scale to match a quoted value
  const MAXW = parseFloat(qs.get('w')) || 820;

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const img = new Image();                    // cross-origin draw is allowed (no pixel read)
  let iw = 0, ih = 0, drawW = 0, drawH = 0, dpr = 1, pxPerCanvas = 1;
  let start = null, cur = null, dragging = false;

  function layout() {
    const vw = Math.max(140, Math.min(window.innerWidth || MAXW, MAXW));
    drawW = vw;
    drawH = iw ? Math.round(vw * ih / iw) : Math.round(vw * 0.6);
    dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(drawW * dpr);
    canvas.height = Math.round(drawH * dpr);
    canvas.style.width = drawW + 'px';
    canvas.style.height = drawH + 'px';
    document.body.style.width = drawW + 'px';
    document.body.style.height = drawH + 'px';
    pxPerCanvas = iw ? iw / drawW : 1;         // image px per canvas px
  }
  function toLocal(e) {
    const r = canvas.getBoundingClientRect();
    return [(e.clientX - r.left) * drawW / r.width, (e.clientY - r.top) * drawH / r.height];
  }
  function lengthText() {
    if (!start || !cur) return '';
    const dx = cur[0] - start[0], dy = cur[1] - start[1];
    let d = isFinite(KCAL) ? Math.hypot(dx, dy) / Math.max(1, drawW) * KCAL
                           : Math.hypot(dx * pxPerCanvas, dy * pxPerCanvas);
    return Math.round(d) + ' ' + UNIT;
  }
  function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, drawW, drawH);
    if (iw) ctx.drawImage(img, 0, 0, drawW, drawH);
    else { ctx.fillStyle = '#999'; ctx.font = '14px Segoe UI';
           ctx.fillText(IMG ? 'loading image…' : '(no image)', 12, 24); }
    if (start && cur) {
      ctx.strokeStyle = '#e02424'; ctx.fillStyle = '#e02424'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(start[0], start[1], 4, 0, 2 * Math.PI); ctx.fill();
      ctx.beginPath(); ctx.moveTo(start[0], start[1]); ctx.lineTo(cur[0], cur[1]); ctx.stroke();
      const a = Math.atan2(cur[1] - start[1], cur[0] - start[0]);
      const len = Math.hypot(cur[0] - start[0], cur[1] - start[1]);
      if (len > 6) {
        ctx.beginPath(); ctx.moveTo(cur[0], cur[1]);
        ctx.lineTo(cur[0] - 10 * Math.cos(a - 0.42), cur[1] - 10 * Math.sin(a - 0.42));
        ctx.lineTo(cur[0] - 10 * Math.cos(a + 0.42), cur[1] - 10 * Math.sin(a + 0.42));
        ctx.closePath(); ctx.fill();
      }
      const t = lengthText();
      ctx.font = 'bold 14px Segoe UI';
      const tw = ctx.measureText(t).width;
      let lx = start[0] + 8, ly = start[1] - 10;
      if (lx + tw + 6 > drawW) lx = drawW - tw - 6;
      if (ly < 16) ly = start[1] + 22;
      ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fillRect(lx - 3, ly - 13, tw + 6, 18);
      ctx.fillStyle = '#e02424'; ctx.fillText(t, lx, ly);
    }
  }
  canvas.addEventListener('pointerdown', e => {
    canvas.setPointerCapture(e.pointerId);
    start = toLocal(e); cur = start.slice(); dragging = true; draw();
  });
  canvas.addEventListener('pointermove', e => { if (dragging) { cur = toLocal(e); draw(); } });
  canvas.addEventListener('pointerup', () => { dragging = false; });
  canvas.addEventListener('pointercancel', () => { dragging = false; });
  window.addEventListener('resize', () => { layout(); draw(); });

  img.onload = () => { iw = img.naturalWidth; ih = img.naturalHeight; layout(); draw(); };
  img.onerror = () => { iw = 0; ih = 0; layout(); draw(); };
  layout(); draw();
  if (IMG) img.src = IMG;
})();
</script>
</body>
</html>
