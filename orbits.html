<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orbits</title>
  <!-- Original AoPS interactive. Replaces the third-party "My Solar System" simulation. -->
<script>
// responsive-scale-to-fit v1 -- replaces fixed-size embedding + EigenNode auto-height.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given, preserving aspect ratio, centred, capped at a maximum zoom. Pointer
// math is unchanged: offsetX/offsetY and getBoundingClientRect-ratio mapping
// are both correct under a CSS transform. Tunable per embed: ?maxscale= (zoom
// cap), ?maxw= (px width cap), ?h= (exact reported height), ?maxh= (anti-spill
// report ceiling). NOTE: the AoPS live-chat embed sizes the iframe from its
// height= attribute and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 700px; height: 500px; overflow: hidden;
      background: #f5f7fa;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas { display: block; }
    #ui {
      width: 700px; height: 70px; padding: 4px 10px;
      font-size: 12px; color: #334455;
      display: flex; flex-direction: column; justify-content: space-around;
    }
    .row { display: flex; align-items: center; gap: 10px; }
    button {
      font-family: inherit; font-size: 12px; padding: 3px 12px;
      border: 1px solid #b8c4d4; border-radius: 4px;
      background: #ffffff; color: #334455; cursor: pointer;
    }
    button:hover { background: #eef3f9; }
    select {
      font-family: inherit; font-size: 12px; padding: 2px 4px;
      border: 1px solid #b8c4d4; border-radius: 4px; background: #fff; color: #334455;
    }
    label { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
    input[type=range] { vertical-align: middle; }
    .val { min-width: 52px; display: inline-block; color: #667788; }
  </style>
</head>
<body>
  <canvas id="c" width="700" height="430"></canvas>
  <div id="ui">
    <div class="row">
      <label>Preset
        <select id="preset">
          <option value="circular">Circular</option>
          <option value="ellipse">Ellipse</option>
          <option value="binary">Binary</option>
          <option value="sun-and-comet">Sun and comet</option>
        </select>
      </label>
      <button id="runBtn">&#9654; Run</button>
      <button id="resetBtn">&#8634; Reset</button>
      <label>Speed
        <input type="range" id="speed" min="0.1" max="3" step="0.05" value="1" style="width:110px">
      </label><span class="val" id="speedVal">1.00&times;</span>
    </div>
    <div class="row">
      <label>Mass ratio
        <input type="range" id="ratio" min="0" max="1000" step="1" value="0" style="width:130px">
      </label><span class="val" id="ratioVal"></span>
      <label><input type="checkbox" id="trailsCk" checked> Trails</label>
      <label><input type="checkbox" id="forceCk"> Force arrows</label>
      <label><input type="checkbox" id="comCk"> Center of mass</label>
    </div>
  </div>
  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 700, H = 430;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
    const CX = 350, CY = 215;
    const SCALE = 110;          // px per distance unit
    const G = 4 * Math.PI * Math.PI;   // so a circular orbit at r=1 has T=1
    const DT = 1e-4;            // leapfrog step (time units)
    const EPS2 = 2.5e-5;        // softening^2, protects against r -> 0
    const VEL_SCALE = 12;       // px per (unit/time) for the velocity arrow

    const Q = new URLSearchParams(location.search);

    // ── Presets ──────────────────────────────────────────────
    // Each preset zeroes total momentum and puts the center of mass at the
    // origin, so everything stays on screen.
    const PRESETS = {
      'circular':      { ratio: 0.005,  a: 1.5,  e: 0    },
      'ellipse':       { ratio: 0.08,   a: 1.45, e: 0.55 },
      'binary':        { ratio: 0.6,    a: 1.2,  e: 0.4  },
      'sun-and-comet': { ratio: 0.0005, a: 1.5,  e: 0.9  },
    };

    function makeTwoBody(ratio, a, e) {
      const M1 = 1, m2 = ratio, Mt = M1 + m2;
      const ra = a * (1 + e);                                  // apoapsis separation
      const va = Math.sqrt(G * Mt * (1 - e) / (a * (1 + e)));  // relative speed there
      // relative position (-ra, 0), relative velocity (0, va)
      return [
        { m: M1, x:  (m2 / Mt) * ra, y: 0, vx: 0, vy: -(m2 / Mt) * va,
          col: '#ffd84d', trailCol: 'rgba(255,216,77,0.55)', r: 13, star: true },
        { m: m2, x: -(M1 / Mt) * ra, y: 0, vx: 0, vy:  (M1 / Mt) * va,
          col: '#ff5fd6', trailCol: 'rgba(255,95,214,0.9)',
          r: 5 + 7 * Math.cbrt(m2), star: false },
      ];
    }

    // Hidden three-body preset (?preset=moon) used to re-render the
    // moon-perturbation GIF: star + planet + sizable moon.
    function makeMoonSystem() {
      const M1 = 1, mp = 0.1, mm = 0.04, msys = mp + mm, Mt = M1 + msys;
      const a = 1.5, e = 0.15, d = 0.12;
      const ra = a * (1 + e);
      const va = Math.sqrt(G * Mt * (1 - e) / (a * (1 + e)));
      const bx = -(M1 / Mt) * ra, bvy = (M1 / Mt) * va;     // planet-moon barycenter
      const vInt = Math.sqrt(G * msys / d);                 // internal circular speed
      return [
        { m: M1, x: (msys / Mt) * ra, y: 0, vx: 0, vy: -(msys / Mt) * va,
          col: '#ffd84d', trailCol: 'rgba(255,216,77,0.55)', r: 13, star: true },
        { m: mp, x: bx - (mm / msys) * d, y: 0, vx: 0, vy: bvy + (mm / msys) * vInt,
          col: '#ff5fd6', trailCol: 'rgba(255,95,214,0.9)', r: 7, star: false },
        { m: mm, x: bx + (mp / msys) * d, y: 0, vx: 0, vy: bvy - (mp / msys) * vInt,
          col: '#8be9ff', trailCol: 'rgba(139,233,255,0.9)', r: 4, star: false },
      ];
    }

    // ── State ────────────────────────────────────────────────
    let presetName = 'ellipse';
    let bodies = [];
    let initState = [];
    let accels = [];
    let running = false;
    let timeAcc = 0;
    let trailAcc = 0;
    let kF = 1;                 // force-arrow normalization
    let dragMode = null;        // null | 'pos' | 'vel'
    let hoverMode = null;

    const trails = [];          // trails[i] = [{x,y}, ...]

    // UI elements
    const presetSel = document.getElementById('preset');
    const runBtn    = document.getElementById('runBtn');
    const resetBtn  = document.getElementById('resetBtn');
    const speedSl   = document.getElementById('speed');
    const speedVal  = document.getElementById('speedVal');
    const ratioSl   = document.getElementById('ratio');
    const ratioVal  = document.getElementById('ratioVal');
    const trailsCk  = document.getElementById('trailsCk');
    const forceCk   = document.getElementById('forceCk');
    const comCk     = document.getElementById('comCk');

    const snapshot = bs => bs.map(b => Object.assign({}, b));

    function computeAcc() {
      const out = [];
      for (let i = 0; i < bodies.length; i++) out.push({ ax: 0, ay: 0 });
      for (let i = 0; i < bodies.length; i++) {
        for (let j = i + 1; j < bodies.length; j++) {
          const dx = bodies[j].x - bodies[i].x, dy = bodies[j].y - bodies[i].y;
          const r2 = dx * dx + dy * dy + EPS2;
          const inv = 1 / (r2 * Math.sqrt(r2));
          const fi = G * bodies[j].m * inv, fj = G * bodies[i].m * inv;
          out[i].ax += fi * dx; out[i].ay += fi * dy;
          out[j].ax -= fj * dx; out[j].ay -= fj * dy;
        }
      }
      return out;
    }

    function normalizeForceScale() {
      const dx = bodies[1].x - bodies[0].x, dy = bodies[1].y - bodies[0].y;
      const r2 = dx * dx + dy * dy + EPS2;
      const F0 = G * bodies[0].m * bodies[1].m / r2;
      kF = 38 / Math.sqrt(F0);
    }

    function clearTrails() {
      trails.length = 0;
      for (let i = 0; i < bodies.length; i++) trails.push([]);
    }

    function ratioToSlider(r) {
      return Math.round((Math.log10(Math.max(1e-4, Math.min(1, r))) + 4) / 4 * 1000);
    }
    function sliderToRatio(s) { return Math.pow(10, -4 + 4 * (s / 1000)); }

    function loadPreset(name, ratioOverride) {
      presetName = name;
      if (name === 'moon') {
        bodies = makeMoonSystem();
        ratioSl.disabled = true;
        ratioVal.textContent = '—';
      } else {
        const p = PRESETS[name] || PRESETS['ellipse'];
        const ratio = (ratioOverride !== undefined) ? ratioOverride : p.ratio;
        bodies = makeTwoBody(ratio, p.a, p.e);
        ratioSl.disabled = false;
        ratioSl.value = ratioToSlider(ratio);
        ratioVal.textContent = ratio.toPrecision(2);
      }
      initState = snapshot(bodies);
      accels = computeAcc();
      normalizeForceScale();
      clearTrails();
      running = false;
      updateRunBtn();
    }

    // Re-split masses while keeping the current *relative* orbit of body 1
    // about body 0 (used when the mass-ratio slider moves).
    function applyRatio(ratio) {
      const b = initState;
      const rx = b[1].x - b[0].x,  ry = b[1].y - b[0].y;
      const vx = b[1].vx - b[0].vx, vy = b[1].vy - b[0].vy;
      const M1 = 1, m2 = ratio, Mt = M1 + m2;
      b[0].m = M1; b[1].m = m2;
      b[0].x = -(m2 / Mt) * rx; b[0].y = -(m2 / Mt) * ry;
      b[1].x =  (M1 / Mt) * rx; b[1].y =  (M1 / Mt) * ry;
      b[0].vx = -(m2 / Mt) * vx; b[0].vy = -(m2 / Mt) * vy;
      b[1].vx =  (M1 / Mt) * vx; b[1].vy =  (M1 / Mt) * vy;
      b[1].r = 5 + 7 * Math.cbrt(m2);
      bodies = snapshot(b);
      accels = computeAcc();
      normalizeForceScale();
      clearTrails();
      running = false;
      updateRunBtn();
      ratioVal.textContent = ratio.toPrecision(2);
    }

    // Keep the center of mass (and total momentum) at zero by moving body 0
    // whenever the user drags body 1.
    function recomputeBody0() {
      let sx = 0, sy = 0, svx = 0, svy = 0;
      for (let i = 1; i < bodies.length; i++) {
        sx += bodies[i].m * bodies[i].x;  sy += bodies[i].m * bodies[i].y;
        svx += bodies[i].m * bodies[i].vx; svy += bodies[i].m * bodies[i].vy;
      }
      bodies[0].x = -sx / bodies[0].m;  bodies[0].y = -sy / bodies[0].m;
      bodies[0].vx = -svx / bodies[0].m; bodies[0].vy = -svy / bodies[0].m;
    }

    function step() {
      const h = DT;
      for (let i = 0; i < bodies.length; i++) {
        bodies[i].vx += accels[i].ax * h / 2;
        bodies[i].vy += accels[i].ay * h / 2;
        bodies[i].x  += bodies[i].vx * h;
        bodies[i].y  += bodies[i].vy * h;
      }
      accels = computeAcc();
      for (let i = 0; i < bodies.length; i++) {
        bodies[i].vx += accels[i].ax * h / 2;
        bodies[i].vy += accels[i].ay * h / 2;
      }
      trailAcc += h;
      if (trailAcc >= 0.004) {
        trailAcc = 0;
        for (let i = 0; i < bodies.length; i++) {
          trails[i].push({ x: bodies[i].x, y: bodies[i].y });
          if (trails[i].length > 5000) trails[i].shift();
        }
      }
    }

    // ── Drawing ──────────────────────────────────────────────
    const sx = x => CX + x * SCALE;
    const sy = y => CY + y * SCALE;

    // Fixed decorative starfield (deterministic).
    function mulberry32(a) {
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        let t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    const starField = (() => {
      const rnd = mulberry32(42), out = [];
      for (let i = 0; i < 60; i++) {
        out.push({ x: rnd() * W, y: rnd() * H, a: 0.10 + 0.22 * rnd(), r: 0.5 + rnd() });
      }
      return out;
    })();

    function drawArrow(x0, y0, dx, dy, color, lw) {
      const len = Math.hypot(dx, dy);
      if (len < 1) return;
      const ang = Math.atan2(dy, dx);
      const hs = Math.max(7, lw * 2.6);
      ctx.save();
      ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = lw;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x0 + dx - hs * 0.7 * Math.cos(ang), y0 + dy - hs * 0.7 * Math.sin(ang));
      ctx.stroke();
      ctx.translate(x0 + dx, y0 + dy);
      ctx.rotate(ang);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(-hs, -hs * 0.48);
      ctx.lineTo(-hs,  hs * 0.48);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function draw() {
      // space background
      ctx.fillStyle = '#000005';
      ctx.fillRect(0, 0, W, H);
      for (const s of starField) {
        ctx.globalAlpha = s.a;
        ctx.fillStyle = '#cfe0ff';
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // trails
      if (trailsCk.checked) {
        for (let i = 0; i < bodies.length; i++) {
          const tr = trails[i];
          if (tr.length < 2) continue;
          ctx.beginPath();
          ctx.strokeStyle = bodies[i].trailCol;
          ctx.lineWidth = 1.6;
          ctx.moveTo(sx(tr[0].x), sy(tr[0].y));
          for (let k = 1; k < tr.length; k++) ctx.lineTo(sx(tr[k].x), sy(tr[k].y));
          ctx.stroke();
        }
      }

      // bodies
      for (const b of bodies) {
        const px = sx(b.x), py = sy(b.y);
        if (b.star) {
          const g = ctx.createRadialGradient(px, py, 1, px, py, b.r * 2.2);
          g.addColorStop(0, 'rgba(255,240,170,0.95)');
          g.addColorStop(0.45, 'rgba(255,200,60,0.35)');
          g.addColorStop(1, 'rgba(255,200,60,0)');
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(px, py, b.r * 2.2, 0, Math.PI * 2); ctx.fill();
        }
        const g2 = ctx.createRadialGradient(px - b.r * 0.35, py - b.r * 0.35, b.r * 0.15,
                                            px, py, b.r);
        g2.addColorStop(0, '#ffffff');
        g2.addColorStop(0.25, b.col);
        g2.addColorStop(1, b.col);
        ctx.fillStyle = g2;
        ctx.beginPath(); ctx.arc(px, py, b.r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 1;
        ctx.stroke();
      }

      // gravitational force arrows (net force on every body, length ∝ √F)
      if (forceCk.checked) {
        for (let i = 0; i < bodies.length; i++) {
          const b = bodies[i];
          const fx = accels[i].ax * b.m, fy = accels[i].ay * b.m;
          const F = Math.hypot(fx, fy);
          if (F <= 0) continue;
          const L = Math.min(140, Math.max(8, kF * Math.sqrt(F)));
          drawArrow(sx(b.x), sy(b.y), L * fx / F, L * fy / F, '#4aa3ff', 4);
        }
      }

      // velocity arrow on the planet (editable while paused)
      if (!running && presetName !== 'moon') {
        const b = bodies[1];
        const px = sx(b.x), py = sy(b.y);
        const tx = px + b.vx * VEL_SCALE, ty = py + b.vy * VEL_SCALE;
        drawArrow(px, py, tx - px, ty - py, '#35d05a', 3);
        ctx.beginPath(); ctx.arc(tx, ty, 6.5, 0, Math.PI * 2);
        ctx.strokeStyle = '#35d05a'; ctx.lineWidth = 2;
        ctx.fillStyle = 'rgba(53,208,90,0.25)';
        ctx.fill(); ctx.stroke();

        ctx.fillStyle = '#8899aa'; ctx.font = '12px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('Drag the planet or the tip of its velocity arrow, then press Run',
                     W / 2, 18);
      }

      // center of mass (red x) — drawn LAST so it sits on top of the star/bodies
      if (comCk.checked) {
        let mx = 0, my = 0, M = 0;
        for (const b of bodies) { mx += b.m * b.x; my += b.m * b.y; M += b.m; }
        const cx = sx(mx / M), cy = sy(my / M);
        ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 2.4; ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(cx - 6, cy - 6); ctx.lineTo(cx + 6, cy + 6);
        ctx.moveTo(cx - 6, cy + 6); ctx.lineTo(cx + 6, cy - 6);
        ctx.stroke();
      }
    }

    // ── Animation loop ───────────────────────────────────────
    let lastTs = null;
    function frame(ts) {
      if (lastTs === null) lastTs = ts;
      const dtReal = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;
      if (running) {
        const yrPerSec = 0.45 * parseFloat(speedSl.value);
        timeAcc += dtReal * yrPerSec;
        let n = Math.floor(timeAcc / DT);
        if (n > 20000) n = 20000;
        timeAcc -= n * DT;
        for (let k = 0; k < n; k++) step();
      }
      draw();
      requestAnimationFrame(frame);
    }

    // ── Interaction (pointer events) ─────────────────────────
    const cpos = e => {
      const r = canvas.getBoundingClientRect();
      return [(e.clientX - r.left) * W / r.width, (e.clientY - r.top) * H / r.height];
    };

    function hitTest(mx, my) {
      if (running || presetName === 'moon') return null;
      const b = bodies[1];
      const px = sx(b.x), py = sy(b.y);
      const tx = px + b.vx * VEL_SCALE, ty = py + b.vy * VEL_SCALE;
      if (Math.hypot(mx - tx, my - ty) < 11) return 'vel';
      if (Math.hypot(mx - px, my - py) < Math.max(b.r + 6, 14)) return 'pos';
      return null;
    }

    canvas.addEventListener('pointerdown', e => {
      const [mx, my] = cpos(e);
      dragMode = hitTest(mx, my);
      if (dragMode) canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener('pointermove', e => {
      const [mx, my] = cpos(e);
      if (dragMode) {
        const b = bodies[1];
        if (dragMode === 'pos') {
          b.x = (mx - CX) / SCALE;
          b.y = (my - CY) / SCALE;
        } else {
          b.vx = (mx - sx(b.x)) / VEL_SCALE;
          b.vy = (my - sy(b.y)) / VEL_SCALE;
        }
        recomputeBody0();
        accels = computeAcc();
        clearTrails();
      } else {
        hoverMode = hitTest(mx, my);
        canvas.style.cursor = hoverMode ? 'grab' : 'default';
      }
    });

    function endDrag() {
      if (dragMode) {
        dragMode = null;
        initState = snapshot(bodies);
        normalizeForceScale();
      }
    }
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);

    // ── Controls ─────────────────────────────────────────────
    function updateRunBtn() {
      runBtn.innerHTML = running ? '&#10074;&#10074; Pause' : '&#9654; Run';
    }
    runBtn.addEventListener('click', () => {
      running = !running;
      if (running) timeAcc = 0;
      updateRunBtn();
    });
    resetBtn.addEventListener('click', () => {
      bodies = snapshot(initState);
      accels = computeAcc();
      normalizeForceScale();
      clearTrails();
      running = false;
      timeAcc = 0;
      updateRunBtn();
    });
    presetSel.addEventListener('change', () => loadPreset(presetSel.value));
    ratioSl.addEventListener('input', () => {
      if (presetName === 'moon') return;
      applyRatio(sliderToRatio(parseFloat(ratioSl.value)));
    });
    speedSl.addEventListener('input', () => {
      speedVal.textContent = parseFloat(speedSl.value).toFixed(2) + '×';
    });

    // ── URL parameters ───────────────────────────────────────
    // ?preset=circular|ellipse|binary|sun-and-comet|comet|moon
    // &force=1 &com=1 &trails=0 &speed=1.5 &ratio=0.08 &run=1
    let qPreset = (Q.get('preset') || 'ellipse').toLowerCase();
    if (qPreset === 'comet') qPreset = 'sun-and-comet';
    if (!(qPreset in PRESETS) && qPreset !== 'moon') qPreset = 'ellipse';
    if (qPreset !== 'moon') presetSel.value = qPreset;
    if (Q.get('force') === '1') forceCk.checked = true;
    if (Q.get('com') === '1') comCk.checked = true;
    if (Q.get('trails') === '0') trailsCk.checked = false;
    const qSpeed = parseFloat(Q.get('speed'));
    if (isFinite(qSpeed)) {
      speedSl.value = Math.max(0.1, Math.min(3, qSpeed));
    }
    speedVal.textContent = parseFloat(speedSl.value).toFixed(2) + '×';

    const qRatio = parseFloat(Q.get('ratio'));
    loadPreset(qPreset, (isFinite(qRatio) && qPreset !== 'moon')
      ? Math.max(1e-4, Math.min(1, qRatio)) : undefined);

    if (Q.get('run') === '1') { running = true; updateRunBtn(); }

    requestAnimationFrame(frame);
  })();
  </script>




<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var CHEAT_DEFS = [
    {
        "name": "preset",
        "type": "select",
        "values": [
            "ellipse",
            "circular",
            "binary",
            "sun-and-comet",
            "moon"
        ],
        "default": "ellipse",
        "desc": "Orbital scenario"
    },
    {
        "name": "force",
        "type": "toggle",
        "default": 0,
        "desc": "Show force vectors"
    },
    {
        "name": "com",
        "type": "toggle",
        "default": 0,
        "desc": "Show center of mass"
    },
    {
        "name": "trails",
        "type": "toggle",
        "default": 1,
        "desc": "Show orbital trails"
    },
    {
        "name": "speed",
        "type": "number",
        "min": 0.1,
        "max": 3,
        "step": 0.1,
        "default": 1,
        "desc": "Animation speed multiplier"
    },
    {
        "name": "ratio",
        "type": "number",
        "min": 0.0001,
        "max": 1,
        "step": 0.01,
        "default": "",
        "desc": "Mass ratio (planet/star)"
    },
    {
        "name": "run",
        "type": "toggle",
        "default": 0,
        "desc": "Auto-run on load"
    },
    {
        "name": "maxscale",
        "type": "number",
        "min": 0.5,
        "max": 5,
        "step": 0.1,
        "default": 2.4,
        "desc": "Max zoom factor for responsive scaling"
    },
    {
        "name": "maxw",
        "type": "number",
        "min": 200,
        "max": 2000,
        "step": 50,
        "default": "",
        "desc": "Max rendered width (px); 0 = uncapped"
    },
    {
        "name": "h",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": "",
        "desc": "Exact reported iframe height (px); overrides auto"
    },
    {
        "name": "maxh",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": 320,
        "desc": "Ceiling on auto-reported iframe height (px)"
    }
  {name:'zoom', type:'toggle', default:0, desc:'Enable zoom/pan controls'},
];

  var EMBED_KEYS = ['cheat'];

  // Build clean URL (no embed/cheat params) with optional overrides
  function buildCleanUrl(overrides) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function (k) { p.delete(k); });
    for (var k in overrides) {
      var v = overrides[k];
      if (v === null || v === '') p.delete(k);
      else p.set(k, v);
    }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }

  function buildCheatUrl(overrides) {
    var base = buildCleanUrl(overrides);
    return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }

  var urlLinkEl = null; // set after render

  function updateUrlDisplay(overrides) {
    if (!urlLinkEl) return;
    var u = buildCleanUrl(overrides || {});
    urlLinkEl.href = u;
    urlLinkEl.textContent = u;
  }

  // Resolve the effective current value of a param (may differ from raw URL string)
  function getEffective(def) {
    var raw = _cpQ.get(def.name);
    if (raw === null) return def['default'] !== undefined ? String(def['default']) : '';
    return raw;
  }

  function isTruthy(v) {
    return v !== '0' && v !== 'false' && v !== 'no' && v !== 'off' && v !== '';
  }

  function makeControl(def) {
    var effective = getEffective(def);

    if (def.type === 'toggle') {
      var on = isTruthy(effective);
      var btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:' + (on ? '#1b3d1b' : '#3d1b1b') + ';color:' +
        (on ? '#6dca80' : '#e07070') + ';border:1px solid ' +
        (on ? '#2a7a3a' : '#8a2a2a') + ';border-radius:3px;padding:3px 10px;' +
        'cursor:pointer;font-size:12px;font-family:inherit;min-width:70px';
      btn.addEventListener('click', function () {
        var updates = {};
        updates[def.name] = on ? '0' : '1';
        window.location.href = buildCheatUrl(updates);
      });
      return btn;
    }

    if (def.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 8px;font-size:12px;font-family:inherit;cursor:pointer';
      def.values.forEach(function (v) {
        var opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        if (effective === String(v)) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', function () {
        var updates = {}; updates[def.name] = sel.value;
        window.location.href = buildCheatUrl(updates);
      });
      return sel;
    }

    if (def.type === 'number') {
      var inp = document.createElement('input');
      inp.type = 'number';
      inp.value = effective;
      if (def.min !== undefined) inp.min = String(def.min);
      if (def.max !== undefined) inp.max = String(def.max);
      if (def.step !== undefined) inp.step = String(def.step);
      inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 6px;width:90px;font-size:12px;font-family:inherit';
      inp.addEventListener('change', function () {
        var updates = {}; updates[def.name] = inp.value;
        window.location.href = buildCheatUrl(updates);
      });
      return inp;
    }

    // text
    var inp2 = document.createElement('input');
    inp2.type = 'text';
    inp2.value = effective;
    inp2.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
      'border-radius:3px;padding:3px 6px;width:220px;font-size:12px;font-family:inherit';
    inp2.addEventListener('change', function () {
      var updates = {}; updates[def.name] = inp2.value;
      window.location.href = buildCheatUrl(updates);
    });
    return inp2;
  }

  function typeLabel(def) {
    if (def.type === 'toggle') return '0 | 1';
    if (def.type === 'select') return def.values.join(' | ');
    if (def.type === 'number') {
      var s = 'number';
      if (def.min !== undefined && def.max !== undefined) s = def.min + '–' + def.max;
      else if (def.min !== undefined) s = '≥' + def.min;
      else if (def.max !== undefined) s = '≤' + def.max;
      return s;
    }
    return 'text';
  }

  function render() {
    // Panel container (fixed at bottom)
    var panel = document.createElement('div');
    panel.id = 'cheat-panel';
    panel.style.cssText = [
      'position:fixed', 'bottom:0', 'left:0', 'right:0',
      'background:rgba(12,18,32,0.97)',
      'color:#c8d8e8',
      'font-family:"Segoe UI",system-ui,monospace',
      'font-size:13px',
      'border-top:2px solid #3a7bd5',
      'z-index:2147483647',
      'max-height:48vh',
      'overflow-y:auto',
      'padding:10px 16px 14px',
      'box-sizing:border-box',
      'box-shadow:0 -4px 24px rgba(0,0,0,0.6)'
    ].join(';');

    // Title bar
    var title = document.createElement('div');
    title.style.cssText = 'font-weight:bold;font-size:13px;color:#7ab8f5;margin-bottom:8px;' +
      'display:flex;align-items:center;justify-content:space-between';
    var titleText = document.createElement('span');
    titleText.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '×';
    closeBtn.title = 'Close cheat panel (reload to restore)';
    closeBtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;' +
      'cursor:pointer;padding:0 4px;line-height:1';
    closeBtn.addEventListener('click', function () { panel.remove(); });
    title.appendChild(titleText);
    title.appendChild(closeBtn);
    panel.appendChild(title);

    // Table
    var table = document.createElement('table');
    table.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var thead = table.createTHead();
    var hrow = thead.insertRow();
    ['Parameter', 'Type / Values', 'Control', 'Description'].forEach(function (h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;' +
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;' +
        'white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = table.createTBody();
    CHEAT_DEFS.forEach(function (def) {
      var row = tbody.insertRow();
      var isSet = _cpQ.has(def.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;' +
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');

      // Name cell
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;' +
        'color:' + (isSet ? '#a8d4ff' : '#7fa8d0') + ';white-space:nowrap;font-family:monospace';
      nc.textContent = def.name;

      // Type cell
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;' +
        'max-width:200px;font-family:monospace';
      tc.textContent = typeLabel(def);

      // Control cell
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(def));

      // Desc cell
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (def.desc || '') + (def['default'] !== undefined
        ? ' (default: ' + def['default'] + ')' : '');
    });
    panel.appendChild(table);

    // URL display
    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;' +
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var urlLabel = document.createElement('span');
    urlLabel.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;' +
      'letter-spacing:0.06em;white-space:nowrap;flex-shrink:0';
    urlLabel.textContent = 'URL:';
    urlLinkEl = document.createElement('a');
    urlLinkEl.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;' +
      'font-family:monospace;text-decoration:none';
    urlLinkEl.addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = buildCheatUrl({});
    });
    var copyBtn = document.createElement('button');
    copyBtn.textContent = 'copy';
    copyBtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;' +
      'border-radius:3px;padding:2px 8px;font-size:11px;font-family:inherit;cursor:pointer;' +
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    copyBtn.addEventListener('click', function () {
      var url = urlLinkEl ? urlLinkEl.href : buildCleanUrl({});
      navigator.clipboard.writeText(url).then(function () {
        copyBtn.textContent = 'copied!';
        copyBtn.style.color = '#6dca80';
        setTimeout(function () { copyBtn.textContent = 'copy'; copyBtn.style.color = '#7ab8f5'; }, 1500);
      }).catch(function () {
        copyBtn.textContent = 'failed';
        setTimeout(function () { copyBtn.textContent = 'copy'; }, 1500);
      });
    });
    updateUrlDisplay();
    urlBox.appendChild(urlLabel);
    urlBox.appendChild(urlLinkEl);
    urlBox.appendChild(copyBtn);
    panel.appendChild(urlBox);

    document.body.appendChild(panel);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>

<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
