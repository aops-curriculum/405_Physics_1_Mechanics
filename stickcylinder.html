<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stick on Cylinder</title>
  <!-- Original AoPS interactive. Faithful 2D replacement for the GlowScript
       "stickcylinder" program: a uniform stick resting on a cylinder, with sliders
       for cylinder radius R, stick length L, and tilt angle θ. The black dot marks
       the center of mass. A warning appears if the contact point would fall beyond
       the end of the stick. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="eigennode-aspect" content="1/1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #fff; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
    body { overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    canvas { display: block; flex: 0 0 auto; }
    .controls { flex: 0 0 auto; padding: 8px 12px; font-size: 14px; }
    .ctrl-row { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    input[type=range] { width: 200px; vertical-align: middle; }
    #warning { color: #b91c1c; font-size: 13px; min-height: 18px; margin-top: 4px; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="controls">
  <div class="ctrl-row">
    <input type="range" id="Rslider" min="0.02" max="1" step="0.02" value="0.25">
    <span id="Rlabel">R: 0.25 m</span>
  </div>
  <div class="ctrl-row">
    <input type="range" id="Lslider" min="1" max="5" step="0.1" value="1">
    <span id="Llabel">L: 1.0 m</span>
  </div>
  <div class="ctrl-row">
    <input type="range" id="thetaSlider" min="-1.6" max="1.6" step="0.02" value="0">
    <span id="thetaLabel">θ: 0.00</span>
  </div>
  <div id="warning"></div>
</div>
<script>
(() => {
  'use strict';

  const MAXW   = 460;
  const CYL_Y  = -0.8; // cylinder center in GlowScript coords

  const canvas      = document.getElementById('c');
  const ctx         = canvas.getContext('2d');
  const Rslider     = document.getElementById('Rslider');
  const Lslider     = document.getElementById('Lslider');
  const thetaSlider = document.getElementById('thetaSlider');
  const Rlabel      = document.getElementById('Rlabel');
  const Llabel      = document.getElementById('Llabel');
  const thetaLabel  = document.getElementById('thetaLabel');
  const warning     = document.getElementById('warning');

  let W, H, scale, ox, oy, dpr;

  function layout() {
    dpr = window.devicePixelRatio || 1;
    // Fit the canvas to the iframe, leaving room for the control panel below,
    // and never exceed the design max width. H = 0.72*W (the scene aspect).
    const controls = document.querySelector('.controls');
    const ctrlH    = controls ? controls.offsetHeight : 130;
    const availW   = window.innerWidth  || MAXW;
    const availH   = (window.innerHeight || 400) - ctrlH;
    W = Math.max(220, Math.min(availW, MAXW, availH / 0.72));
    H = Math.round(W * 0.72);
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
  }

  // Fit all scene points into the canvas with padding fraction PAD on each side.
  function autoFit(allX, allY) {
    const PAD = 0.12;
    const xMin = Math.min(...allX), xMax = Math.max(...allX);
    const yMin = Math.min(...allY), yMax = Math.max(...allY);
    const xRange = Math.max(xMax - xMin, 0.1);
    const yRange = Math.max(yMax - yMin, 0.1);
    scale = Math.min(W * (1 - 2 * PAD) / xRange, H * (1 - 2 * PAD) / yRange);
    ox = W / 2 - (xMin + xMax) / 2 * scale;
    oy = H / 2 + (yMin + yMax) / 2 * scale; // y-flip: gy(y) = oy - y*scale
  }

  function gx(x) { return ox + x * scale; }
  function gy(y) { return oy - y * scale; }

  function draw() {
    const R     = parseFloat(Rslider.value);
    const L     = parseFloat(Lslider.value);
    let   theta = parseFloat(thetaSlider.value);

    let clamped = false;
    if (R * theta > L / 2)  { theta = L / (2 * R); clamped = true; }
    if (R * theta < -L / 2) { theta = -L / (2 * R); clamped = true; }
    warning.textContent = clamped
      ? "The stick can't roll that far. I've stopped moving it until theta gets closer to zero."
      : '';

    // Compute geometry for bounding box
    const cpx0 = Math.sin(theta) * R;
    const cpy0 = CYL_Y + Math.cos(theta) * R;
    const ax0  = Math.cos(theta), ay0 = -Math.sin(theta);
    const f0   = R * theta / L + 0.5;
    const sX0  = cpx0 - f0 * L * ax0, sY0 = cpy0 - f0 * L * ay0;
    const eX0  = sX0 + L * ax0,        eY0 = sY0 + L * ay0;
    const axisBottom = CYL_Y - R - 0.6;

    autoFit(
      [sX0, eX0, -R, R],
      [sY0, eY0, CYL_Y + R, axisBottom]
    );

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);

    // Cylinder (red circle)
    ctx.beginPath();
    ctx.arc(gx(0), gy(CYL_Y), R * scale, 0, 2 * Math.PI);
    ctx.strokeStyle = '#e02424';
    ctx.lineWidth   = 2;
    ctx.stroke();
    ctx.fillStyle   = 'rgba(220,50,50,0.15)';
    ctx.fill();

    // Contact point on cylinder surface at angle theta from top
    const cpx = Math.sin(theta) * R;
    const cpy = CYL_Y + Math.cos(theta) * R;

    // Stick axis direction: perpendicular to the radius at contact = (cos(theta), -sin(theta))
    const ax = Math.cos(theta);
    const ay = -Math.sin(theta);

    // Fraction along stick where contact occurs: f = R*theta/L + 0.5
    const f = R * theta / L + 0.5;

    // Stick start position: contact_point - f * L * axis
    const stickX = cpx - f * L * ax;
    const stickY = cpy - f * L * ay;

    // Stick end
    const stickEndX = stickX + L * ax;
    const stickEndY = stickY + L * ay;

    // Stick (blue line, drawn as thick rectangle)
    const stickThickness = Math.max(2, scale * 0.025);
    ctx.beginPath();
    ctx.moveTo(gx(stickX), gy(stickY));
    ctx.lineTo(gx(stickEndX), gy(stickEndY));
    ctx.strokeStyle = '#1d4ed8';
    ctx.lineWidth   = stickThickness;
    ctx.lineCap     = 'round';
    ctx.stroke();

    // Center of mass (black dot at middle of stick)
    const comX = stickX + L / 2 * ax;
    const comY = stickY + L / 2 * ay;
    const comR = Math.max(3, scale * 0.04);
    ctx.beginPath();
    ctx.arc(gx(comX), gy(comY), comR, 0, 2 * Math.PI);
    ctx.fillStyle = '#111';
    ctx.fill();

    // Vertical axis line (z-axis reference)
    ctx.beginPath();
    ctx.moveTo(gx(0), gy(CYL_Y - 0.05));
    ctx.lineTo(gx(0), gy(axisBottom));
    ctx.strokeStyle = '#888';
    ctx.lineWidth   = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function update() {
    Rlabel.textContent     = 'R: ' + parseFloat(Rslider.value).toFixed(2) + ' m';
    Llabel.textContent     = 'L: ' + parseFloat(Lslider.value).toFixed(1) + ' m';
    thetaLabel.textContent = 'θ: ' + parseFloat(thetaSlider.value).toFixed(2);
    draw();
  }

  Rslider.addEventListener('input', update);
  Lslider.addEventListener('input', update);
  thetaSlider.addEventListener('input', update);
  window.addEventListener('resize', () => { layout(); draw(); });

  layout();
  draw();
})();
</script><!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
